<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>mNEET - Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="theme-dark">

    <!-- FIXED TOP BAR -->
    <header class="dashboard-header">
        <!-- Top Left Corner Widgets / Back Button Toggle -->
        <div class="header-left" id="header-left-zone">
            <button id="dashboard-back-btn" class="hidden-widget link-btn" style="font-size: 18px; color: #FFFFFF;"><i class="fas fa-arrow-left"></i></button>
            <div id="home-top-widgets" style="display: flex; align-items: center; gap: 14px;">
                <button id="wp-community-btn" class="link-btn" style="color: #10B981; font-size: 20px;"><i class="fab fa-whatsapp"></i></button>
                <button id="noti-btn" class="link-btn" style="color: #F3B917; font-size: 18px; position: relative;">
                    <i class="fas fa-bell"></i>
                    <span style="position: absolute; top: -2px; right: -2px; width: 6px; height: 6px; background-color: #EF4444; border-radius: 50%;"></span>
                </button>
            </div>
        </div>

        <!-- Center: App Logo (m: white, NEET: golden) -->
        <div class="header-center" style="font-weight: 900; font-size: 20px; letter-spacing: 0.5px;">
            <span class="m-logo">m</span><span class="neet-logo">NEET</span>
        </div>

        <!-- Top Right Corner Widgets -->
        <div class="header-right" style="display: flex; align-items: center; gap: 12px;">
            <div class="bp-badge">
                <i class="fas fa-coins" style="margin-right: 5px;"></i><span id="top-bp-count">0 BP</span>
            </div>
            <button id="drawer-open-btn" class="link-btn" style="color: #FFFFFF; font-size: 18px; padding: 4px;"><i class="fas fa-bars"></i></button>
        </div>
    </header>

    <!-- SIDE PROFILE HAMBURGER DRAWER -->
    <div id="profile-drawer" class="profile-drawer-closed">
        <div class="drawer-header">
            <h3>Student Station</h3>
            <button id="drawer-close-btn" class="link-btn" style="color: #FFFFFF; font-size: 18px;"><i class="fas fa-times"></i></button>
        </div>
        <div class="drawer-content">
            <!-- Student Mini Profile Card -->
            <div class="drawer-profile-card">
                <div class="avatar-circle" id="user-avatar">M</div>
                <div style="overflow: hidden;">
                    <h4 id="profile-name-display" style="margin: 0; font-size: 14px; font-weight: 700; white-space: nowrap; text-overflow: ellipsis; overflow: hidden;">Loading Student...</h4>
                    <p id="profile-phone-display" style="margin: 4px 0 0 0; font-size: 11px; color: #94A3B8;">Loading...</p>
                </div>
            </div>
            <!-- Menu Actions -->
            <div class="drawer-menu-list">
                <div style="margin-top: 15px; padding: 12px; border: 1px dashed var(--border-input); border-radius: 14px;">
    <h5 style="margin: 0 0 8px 0; font-size: 11px; color: var(--neon-gold); text-transform: uppercase;">Set My Custom Targets</h5>
    
    <div style="margin-bottom: 8px;">
        <label style="font-size: 10px; color: var(--text-muted); display:block; margin-bottom:4px;">Target Medical College</label>
        <input type="text" id="target-college-input" class="input-field" placeholder="e.g. AIIMS Delhi">
    </div>
    
    <div style="margin-bottom: 12px;">
        <label style="font-size: 10px; color: var(--text-muted); display:block; margin-bottom:4px;">Target Exam Date</label>
        <input type="date" id="target-date-input" class="input-field">
    </div>
    
    <button id="save-goals-btn" class="btn-mneet" style="padding: 8px; font-size: 12px;">Update My Targets</button>
                </div>
                
                <button class="drawer-item"><i class="fas fa-book-open"></i> Purchased Courses</button>
                <div class="drawer-item" style="display: flex; justify-content: space-between; align-items: center; cursor: default;">
                    <span><i class="fas fa-adjust"></i> Dark Mode</span>
                    <label class="switch-toggle">
                        <input type="checkbox" id="dashboard-theme-toggle" checked>
                        <span class="slider-round"></span>
                    </label>
                </div>
                <button class="drawer-item"><i class="fas fa-circle-info"></i> About mNEET App</button>
            </div>
            <button id="logout-submit-btn" class="drawer-logout-btn"><i class="fas fa-power-off"></i> Secure Log Out</button>
        </div>
    </div>
    <div id="drawer-overlay" class="hidden-widget"></div>

    <!-- MAIN SCROLLABLE CONTAINER -->
    <main class="dashboard-viewport" id="dashboard-main-render-area">
        <!-- Views script injects inner modules here -->
    </main>

    <!-- FIXED BOTTOM NAVIGATION BAR -->
    <footer class="dashboard-footer">
        <button class="footer-tab active-tab" data-target="home"><i class="fas fa-home"></i><span>Home</span></button>
        <button class="footer-tab" data-target="batches"><i class="fas fa-layer-group"></i><span>Batches</span></button>
        <button class="footer-tab" data-target="study"><i class="fas fa-graduation-cap"></i><span>Study</span></button>
        <button class="footer-tab" data-target="test"><i class="fas fa-file-invoice"></i><span>Test</span></button>
        <button class="footer-tab" data-target="mstore"><i class="fas fa-shopping-bag"></i><span>mStore</span></button>
    </footer>

    <script type="module" src="dashboard_view.js"></script>
    <script type="module" src="dashboard_logic.js"></script>
</body>
    </html>
