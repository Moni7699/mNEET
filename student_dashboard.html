<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>mNEET - Platform</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="theme-dark">

    <!-- STATIC FIXED HEADER BAR -->
    <header class="dashboard-header">
        <div class="header-left" id="header-left-zone">
            <button id="dashboard-back-btn" class="hidden-widget link-btn" style="font-size: 18px; color: var(--text-title);"><i class="fas fa-arrow-left"></i></button>
            <div id="home-top-widgets" style="display: flex; align-items: center; gap: 14px;">
                <!-- হোয়াটসঅ্যাপ লোগোতে তোমার রিকোয়েস্ট অনুযায়ী ফিক্সড গ্রিন কালার ম্যাপ করা হলো -->
                <button id="wp-community-btn" class="link-btn" style="color: var(--wp-green) !important; font-size: 22px;"><i class="fab fa-whatsapp"></i></button>
                <button id="noti-btn" class="link-btn" style="color: var(--gold); font-size: 18px; position: relative;">
                    <i class="fas fa-bell"></i>
                    <span style="position: absolute; top: -2px; right: -2px; width: 6px; height: 6px; background-color: #EF4444; border-radius: 50%;"></span>
                </button>
            </div>
        </div>

        <div class="header-center" style="font-weight: 900; font-size: 20px;">
            <span style="color: var(--text-title);">m</span><span style="color: var(--gold);">NEET</span>
        </div>

        <div class="header-right" style="display: flex; align-items: center; gap: 12px;">
            <div style="font-size: 11px; font-weight: 800; color: var(--gold); background: rgba(243,185,23,0.1); border: 1px solid rgba(243,185,23,0.3); padding: 5px 10px; border-radius: 20px; white-space: nowrap;">
                <i class="fas fa-coins" style="margin-right: 5px;"></i><span id="top-bp-count">0 BP</span>
            </div>
            <button id="drawer-open-btn" class="link-btn" style="color: var(--text-title); font-size: 18px;"><i class="fas fa-bars"></i></button>
        </div>
    </header>

    <!-- 🔒 INDEPENDENT MAIN INNER VIEWPORT LAYER -->
    <main class="dashboard-viewport" id="dashboard-main-render-area">
        <!-- Views Content Load Area -->
    </main>

    <!-- 🔒 OUTSIDE INDEPENDENT DRAWER BOX (Saves from overwrite) -->
    <div id="profile-drawer" class="drawer-closed">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 1px solid var(--border-line); padding-bottom: 10px;">
            <h3 style="margin:0; font-size:16px; color:var(--gold);">Student Station</h3>
            <button id="drawer-close-btn" class="link-btn" style="color: var(--text-title); font-size: 18px;"><i class="fas fa-times"></i></button>
        </div>
        
        <div class="drawer-profile-card" style="display: flex; align-items: center; gap: 12px; background-color: var(--bg-app); padding: 12px; border-radius: 16px; margin-bottom: 20px;">
            <div id="user-avatar" style="width: 36px; height: 36px; background-color: var(--gold); border-radius: 50%; color: #000; font-weight: 900; display: flex; align-items: center; justify-content: center;">M</div>
            <div>
                <h4 id="profile-name-display" style="margin:0; font-size:14px; font-weight:700; color: var(--text-title);">Student</h4>
                <p id="profile-phone-display" style="margin:4px 0 0 0; font-size:11px; color: var(--text-para);">Phone</p>
            </div>
        </div>

        <div style="display: flex; flex-direction: column; gap: 8px;">
            <div style="display: flex; justify-content: space-between; align-items: center; padding: 12px; font-size: 13px; font-weight:600;">
                <span><i class="fas fa-adjust" style="margin-right:10px;"></i> Dark Mode Theme</span>
                <label class="switch">
                    <input type="checkbox" id="dashboard-theme-toggle" checked>
                    <span class="slider"></span>
                </label>
            </div>
        </div>

        <!-- Custom Target Forms Inside Main Root Drawer Container -->
        <div style="margin-top: auto; padding: 12px; border: 1px dashed var(--border-line); border-radius: 14px; margin-bottom: 15px;">
            <h5 style="margin: 0 0 8px 0; font-size: 11px; color: var(--gold); text-transform: uppercase;">Set Custom Target</h5>
            <div style="margin-bottom: 8px;">
                <input type="text" id="target-college-input" class="input-field" placeholder="Target Medical College">
            </div>
            <div style="margin-bottom: 12px;">
                <input type="date" id="target-date-input" class="input-field">
            </div>
            <button id="save-goals-btn" class="btn-mneet" style="padding: 8px; font-size: 12px;">Update My Targets</button>
        </div>

        <button id="logout-submit-btn" style="width:100%; background-color:#EF4444; color:white; border:none; padding:12px; border-radius:12px; font-weight:700; font-size:13px; cursor:pointer;"><i class="fas fa-power-off"></i> Secure Log Out</button>
    </div>
    <div id="drawer-overlay" class="hidden-widget"></div>

    <!-- STATIC FIXED FOOTER NAVIGATION -->
    <footer class="dashboard-footer">
        <button class="footer-tab active-tab" data-target="home"><i class="fas fa-home"></i><span style="font-size:10px; font-weight:700;">Home</span></button>
        <button class="footer-tab" data-target="batches"><i class="fas fa-layer-group"></i><span style="font-size:10px; font-weight:700;">Batches</span></button>
        <button class="footer-tab" data-target="study"><i class="fas fa-graduation-cap"></i><span style="font-size:10px; font-weight:700;">Study</span></button>
        <button class="footer-tab" data-target="test"><i class="fas fa-file-invoice"></i><span style="font-size:10px; font-weight:700;">Test</span></button>
        <button class="footer-tab" data-target="mstore"><i class="fas fa-shopping-bag"></i><span style="font-size:10px; font-weight:700;">mStore</span></button>
    </footer>

    <script type="module" src="dashboard_view.js"></script>
    <script type="module" src="dashboard_logic.js"></script>
</body>
            </html>
