<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>National Ranks - mNEET</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { darkMode: 'class' }</script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-50 dark:bg-slate-950 text-slate-800 dark:text-slate-100 min-h-screen">
    <header class="bg-white dark:bg-slate-900 border-b border-slate-200 dark:border-slate-800 px-6 py-4 flex items-center space-x-3">
        <button onclick="window.location.href='student-dashboard.html'" class="text-slate-400 text-sm font-bold"><i class="fa-solid fa-arrow-left"></i> Back</button>
        <h2 class="font-black text-lg text-slate-900 dark:text-white">Medical Hierarchy Matrix</h2>
    </header>
    <div class="max-w-2xl mx-auto p-4 md:p-6 space-y-6">
        <!-- 3 Category Tags -->
        <div class="grid grid-cols-3 gap-2">
            <div class="bg-emerald-500/10 border border-emerald-500/20 text-center p-3 rounded-xl font-black text-[10px] text-emerald-500 uppercase tracking-wide">🏆 Promotion<br><span class="text-[9px] font-medium lowercase text-slate-400">"Future Surgeon"</span></div>
            <div class="bg-sky-500/10 border border-sky-500/20 text-center p-3 rounded-xl font-black text-[10px] text-sky-500 uppercase tracking-wide">➖ Stay Zone<br><span class="text-[9px] font-medium lowercase text-slate-400">"Intern Capsule"</span></div>
            <div class="bg-rose-500/10 border border-rose-500/20 text-center p-3 rounded-xl font-black text-[10px] text-rose-500 uppercase tracking-wide">⚠️ Demotion<br><span class="text-[9px] font-medium lowercase text-slate-400">"Amoeba Trainee"</span></div>
        </div>
        
        <!-- Leaderboard List -->
        <div class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 p-4 rounded-2xl space-y-2">
            <div class="flex justify-between p-3 bg-sky-500/10 border border-sky-500 rounded-xl items-center font-bold text-xs text-sky-500"><span>#42 You (Highlight status)</span> <span>🪙 100 bP</span></div>
            <div class="flex justify-between p-3 bg-slate-100 dark:bg-slate-950/40 border border-slate-200 dark:border-slate-800 rounded-xl items-center text-xs text-slate-400"><span>#1 Rank Alpha Aspirant</span> <span>🪙 5,400 bP</span></div>
        </div>
    </div>
</body>
</html>
