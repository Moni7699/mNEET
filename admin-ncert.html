<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>mNEET Admin - NCERT Studio Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class' }
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyApQOM_mtFZ16RiNJEaIUhb4iYFBIBRK58",
            authDomain: "mneet-spark.firebaseapp.com",
            databaseURL: "https://mneet-spark-default-rtdb.firebaseio.com",
            projectId: "mneet-spark",
            storageBucket: "mneet-spark.firebasestorage.app",
            messagingSenderId: "252201633700",
            appId: "1:252201633700:web:1a1e7a2cff1f0b168ea331"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const userDoc = await getDoc(doc(db, "users", user.uid));
                if (userDoc.exists() && userDoc.data().role === 'admin') {
                    document.getElementById('adminNcertPortal').classList.remove('hidden');
                    renderSubjects();
                } else { window.location.href = "index.html"; }
            } else { window.location.href = "index.html"; }
        });

        // Application State Data Storage
        let subjects = [{id: 1, name: "Biology Arena", hidden: false}];
        let chapters = [{id: 101, name: "Chapter 1: The Living World", hidden: false}];
        let bookPages = [
            "The living world is rich in biodiversity. Organisms are classified scientifically using standard international taxonomical metrics. Taxonomy rules define structural nomenclature.",
            "Cell is the basic functional component of life. All biological cells contain plasma structures. Membranes balance electrochemical potentials dynamically."
        ];
        let currentPage = 0;
        let selectedSentenceText = "";

        // CRUD Matrix for Subjects
        window.createSubject = function() {
            const input = document.getElementById('subjectInput');
            if(!input.value.trim()) return;
            subjects.push({id: Date.now(), name: input.value.trim(), hidden: false});
            input.value = "";
            renderSubjects();
        };

        window.renderSubjects = function() {
            const container = document.getElementById('subjectListNode');
            container.innerHTML = subjects.map(s => `
                <div draggable="true" ondragstart="onDragStartNode(event)" ondragover="onDragOverNode(event)" ondrop="onDropNode(event)" class="bg-white dark:bg-slate-900 border ${s.hidden ? 'opacity-40 border-slate-300' : 'border-slate-200 dark:border-slate-800'} rounded-2xl p-4 flex justify-between items-center shadow-sm">
                    <div class="flex items-center space-x-3 cursor-pointer flex-1" onclick="navigateToView('view-chapter-hub')">
                        <i class="fa-solid fa-grip-vertical text-slate-400"></i>
                        <span class="font-black text-xs md:text-sm ${s.hidden ? 'line-through' : ''}">${s.name}</span>
                    </div>
                    <div class="flex items-center space-x-1">
                        <button onclick="event.stopPropagation(); editSubject(${s.id})" class="bg-sky-500 text-white p-2 rounded-xl text-xs"><i class="fa-solid fa-pen"></i></button>
                        <button onclick="event.stopPropagation(); toggleHideSubject(${s.id})" class="bg-amber-500 text-white p-2 rounded-xl text-xs"><i class="fa-solid fa-eye-slash"></i></button>
                        <button onclick="event.stopPropagation(); deleteSubject(${s.id})" class="bg-rose-500 text-white p-2 rounded-xl text-xs"><i class="fa-solid fa-trash"></i></button>
                    </div>
                </div>
            `).join('');
        };

        window.editSubject = function(id) {
            const name = prompt("Enter new subject name:");
            if(name) { subjects = subjects.map(s => s.id === id ? {...s, name} : s); renderSubjects(); }
        };
        window.toggleHideSubject = function(id) {
            subjects = subjects.map(s => s.id === id ? {...s, hidden: !s.hidden} : s); renderSubjects();
        };
        window.deleteSubject = function(id) {
            if(confirm("Delete this subject?")) { subjects = subjects.filter(s => s.id !== id); renderSubjects(); }
        };

        // CRUD Matrix for Chapters
        window.createChapter = function() {
            const input = document.getElementById('chapterInput');
            if(!input.value.trim()) return;
            chapters.push({id: Date.now(), name: input.value.trim(), hidden: false});
            input.value = "";
            renderChapters();
        };

        window.renderChapters = function() {
            const container = document.getElementById('chapterListNode');
            container.innerHTML = chapters.map(c => `
                <div draggable="true" ondragstart="onDragStartNode(event)" ondragover="onDragOverNode(event)" ondrop="onDropNode(event)" class="bg-white dark:bg-slate-900 border ${c.hidden ? 'opacity-40 border-slate-300' : 'border-slate-200 dark:border-slate-800'} rounded-2xl p-4 flex justify-between items-center shadow-sm">
                    <div class="flex items-center space-x-3 cursor-pointer flex-1" onclick="navigateToView('view-book-canvas'); renderBookPage();">
                        <i class="fa-solid fa-grip-vertical text-slate-400"></i>
                        <span class="font-black text-xs md:text-sm ${c.hidden ? 'line-through' : ''}">${c.name}</span>
                    </div>
                    <div class="flex items-center space-x-1">
                        <button onclick="event.stopPropagation(); editChapter(${c.id})" class="bg-sky-500 text-white p-2 rounded-xl text-xs"><i class="fa-solid fa-pen"></i></button>
                        <button onclick="event.stopPropagation(); toggleHideChapter(${c.id})" class="bg-amber-500 text-white p-2 rounded-xl text-xs"><i class="fa-solid fa-eye-slash"></i></button>
                        <button onclick="event.stopPropagation(); deleteChapter(${c.id})" class="bg-rose-500 text-white p-2 rounded-xl text-xs"><i class="fa-solid fa-trash"></i></button>
                    </div>
                </div>
            `).join('');
        };

        window.editChapter = function(id) {
            const name = prompt("Enter new chapter name:");
            if(name) { chapters = chapters.map(c => c.id === id ? {...c, name} : c); renderChapters(); }
        };
        window.toggleHideChapter = function(id) {
            chapters = chapters.map(c => c.id === id ? {...c, hidden: !c.hidden} : c); renderChapters();
        };
        window.deleteChapter = function(id) {
            if(confirm("Delete this chapter?")) { chapters = chapters.filter(c => c.id !== id); renderChapters(); }
        };

        // Screen Navigation Router Matrix
        window.navigateToView = function(viewId) {
            ['view-subject-hub', 'view-chapter-hub', 'view-book-canvas'].forEach(v => document.getElementById(v).classList.add('hidden'));
            document.getElementById(viewId).classList.remove('hidden');
            const bottomStrap = document.getElementById('adminBottomNav');
            if(viewId === 'view-book-canvas') bottomStrap.classList.add('hidden');
            else bottomStrap.classList.remove('hidden');
            if(viewId === 'view-chapter-hub') renderChapters();
        };

        // Drag and drop sequencing
        let draggedItem = null;
        window.onDragStartNode = function(e) { draggedItem = e.currentTarget; };
        window.onDragOverNode = function(e) { e.preventDefault(); };
        window.onDropNode = function(e) {
            e.preventDefault();
            if(draggedItem !== e.currentTarget) {
                const parent = e.currentTarget.parentNode;
                parent.insertBefore(draggedItem, e.currentTarget);
            }
        };

        window.toggleTheme = () => document.documentElement.classList.toggle('dark');
    </script>
</head>
<body class="bg-slate-50 dark:bg-slate-950 text-slate-800 dark:text-slate-100 min-h-screen transition-colors duration-300">
    <div id="adminNcertPortal" class="hidden min-h-screen flex flex-col justify-between overflow-x-hidden">
        
        <!-- VIEW 1: ALL SUBJECTS COMPONENT -->
        <div id="view-subject-hub" class="w-full flex-1 flex flex-col">
            <header class="bg-white dark:bg-slate-900 border-b border-slate-200 dark:border-slate-800 px-4 py-4 sticky top-0 z-40 flex justify-between items-center w-full">
                <div class="flex items-center space-x-3 w-full">
                    <button onclick="window.location.href='admin-dashboard.html'" class="text-slate-400 p-2"><i class="fa-solid fa-house-medical text-lg"></i></button>
                    <h2 class="font-black text-sm md:text-base mx-auto">All Subject</h2>
                    <button onclick="toggleTheme()" class="text-slate-400 p-2"><i class="fa-solid fa-circle-half-stroke"></i></button>
                </div>
            </header>
            <div class="w-full px-4 md:px-6 py-6 space-y-6 flex-1 max-w-5xl mx-auto">
                <div class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 p-4 rounded-3xl flex items-center gap-3 shadow-sm">
                    <input type="text" id="subjectInput" class="w-full bg-slate-100 dark:bg-slate-950 border border-slate-200 dark:border-slate-800 rounded-xl px-4 py-2.5 text-xs font-black focus:outline-none" placeholder="Create Subject Name...">
                    <button onclick="createSubject()" class="bg-rose-500 text-white font-black text-xs px-6 py-3 rounded-xl transition whitespace-nowrap">Create Subject</button>
                </div>
                <div class="space-y-3 w-full" id="subjectListNode"></div>
            </div>
        </div>
                <!-- VIEW 2: CHAPTER NAMES HUB -->
        <div id="view-chapter-hub" class="w-full flex-1 flex flex-col hidden">
            <header class="bg-white dark:bg-slate-900 border-b border-slate-200 dark:border-slate-800 px-4 py-4 sticky top-0 z-40 flex justify-between items-center w-full">
                <div class="flex items-center space-x-3 w-full">
                    <button onclick="navigateToView('view-subject-hub')" class="text-slate-400 p-2"><i class="fa-solid fa-chevron-left text-lg"></i></button>
                    <h2 class="font-black text-sm md:text-base mx-auto">Chapter names</h2>
                    <div class="w-8"></div>
                </div>
            </header>
            <div class="w-full px-4 md:px-6 py-6 space-y-6 flex-1 max-w-5xl mx-auto">
                <div class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 p-4 rounded-3xl flex flex-col gap-3 shadow-sm">
                    <input type="text" id="chapterInput" class="w-full bg-slate-100 dark:bg-slate-950 border border-slate-200 dark:border-slate-800 rounded-xl px-4 py-2.5 text-xs font-black focus:outline-none" placeholder="Enter Chapter Title...">
                    <div class="flex gap-3 w-full items-center">
                        <input type="file" accept=".pdf" class="w-full bg-slate-100 dark:bg-slate-950 border border-slate-200 dark:border-slate-800 rounded-xl p-2 text-xs font-bold text-slate-400">
                        <button onclick="createChapter()" class="bg-rose-500 text-white font-black text-xs px-6 py-3 rounded-xl transition whitespace-nowrap">Create Chapter</button>
                    </div>
                </div>
                <div class="space-y-3 w-full" id="chapterListNode"></div>
            </div>
        </div>

        <!-- VIEW 3: DYNAMIC ACCURATE MOBILE A4 TEXTBOOK CANVAS WITH INJECTOR POPUP -->
        <div id="view-book-canvas" class="w-full flex-1 flex flex-col hidden bg-slate-800 text-slate-900">
            <header class="bg-slate-900 text-white border-b border-slate-800 px-4 py-3 flex justify-between items-center w-full shadow-md">
                <button onclick="navigateToView('view-chapter-hub')" class="text-slate-400 font-bold text-xs"><i class="fa-solid fa-chevron-left"></i> Back</button>
                <h2 class="font-black text-xs uppercase tracking-wider text-slate-300">The Living World</h2>
                <div class="w-8"></div>
            </header>

            <div class="flex-1 w-full max-w-md mx-auto p-4 flex flex-col justify-start items-center overflow-y-auto">
                <!-- ACCURATE PORTRAIT A4 PDF BOOK FRAME LAYOUT -->
                <div class="bg-[#fcfbf7] border-2 border-amber-900/10 shadow-2xl rounded-xl w-full aspect-[1/1.414] p-6 flex flex-col justify-between relative select-text">
                    <div id="bookPageContent" class="text-xs md:text-sm font-serif leading-relaxed text-slate-800 space-y-3"></div>
                    <div class="border-t border-amber-900/10 pt-3 flex justify-between items-center text-[10px] font-mono text-slate-400 font-bold">
                        <button onclick="flipPage('prev')" class="hover:text-slate-900"><i class="fa-solid fa-arrow-left"></i> Prev</button>
                        <span id="pageIndicator">Page 1 of 2</span>
                        <button onclick="flipPage('next')" class="hover:text-slate-900">Next <i class="fa-solid fa-arrow-right"></i></button>
                    </div>
                </div>
            </div>

            <!-- SENTENCE EDITOR INTERACTIVE FLOATING POPUP DIALOG -->
            <div id="mcqModal" class="fixed inset-0 bg-black/60 backdrop-blur-sm hidden z-50 flex items-end sm:items-center justify-center p-4">
                <div class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 w-full max-w-sm rounded-t-3xl sm:rounded-3xl p-5 space-y-4 max-h-[85vh] overflow-y-auto text-xs font-bold text-slate-700 dark:text-slate-300 shadow-2xl">
                    <div class="flex justify-between items-center border-b pb-2">
                        <span class="text-rose-500 font-black uppercase tracking-widest text-[9px]"><i class="fa-solid fa-tags mr-1"></i> Tag PYQ MCQ Workspace</span>
                        <button onclick="closeMcqModal()" class="text-slate-400 text-base"><i class="fa-solid fa-xmark"></i></button>
                    </div>
                    <p id="targetSentenceDisplay" class="italic text-slate-400 font-serif bg-slate-50 dark:bg-slate-950 p-2.5 rounded-xl border border-dashed"></p>
                    
                    <textarea id="pyqQuestionArea" rows="2" class="w-full bg-slate-50 dark:bg-slate-950 border border-slate-200 dark:border-slate-800 rounded-xl p-2.5 focus:outline-none" placeholder="Type Question parameter..."></textarea>
                    
                    <div class="w-full">
                        <button onclick="document.getElementById('imgField').click()" class="bg-slate-100 dark:bg-slate-950 w-full p-2 rounded-xl text-center text-slate-400"><i class="fa-solid fa-image mr-1"></i> Add Question Image</button>
                        <input type="file" id="imgField" accept="image/*" class="hidden" onchange="const r=new FileReader();r.onload=()=>{const i=document.getElementById('modalImgPre');i.src=r.result;i.classList.remove('hidden')};if(this.files[0])r.readAsDataURL(this.files[0])">
                        <img id="modalImgPre" class="hidden w-full h-20 object-contain mt-2 border rounded-xl">
                    </div>

                    <div class="grid grid-cols-2 gap-2">
                        <input type="text" class="bg-slate-50 dark:bg-slate-950 border p-2 rounded-xl focus:outline-none" placeholder="Option A">
                        <input type="text" class="bg-slate-50 dark:bg-slate-950 border p-2 rounded-xl focus:outline-none" placeholder="Option B">
                        <input type="text" class="bg-slate-50 dark:bg-slate-950 border p-2 rounded-xl focus:outline-none" placeholder="Option C">
                        <input type="text" class="bg-slate-50 dark:bg-slate-950 border p-2 rounded-xl focus:outline-none" placeholder="Option D">
                    </div>
                    <input type="text" class="w-full bg-slate-50 dark:bg-slate-950 border p-2 rounded-xl focus:outline-none" placeholder="Solution Explanation...">
                    <button onclick="alert('🚀 Injected PYQ MCQ Locked!'); closeMcqModal();" class="w-full bg-rose-500 text-white py-2.5 rounded-xl">Deploy MCQ Question</button>
                </div>
            </div>
        </div>

        <script>
            // Flipbook Page Management Engine
            window.renderBookPage = function() {
                document.getElementById('pageIndicator').innerText = `Page ${currentPage + 1} of ${bookPages.length}`;
                const body = document.getElementById('bookPageContent');
                body.innerHTML = bookPages[currentPage].split('. ').map(s => {
                    if(!s.trim()) return '';
                    return `<span onclick="openMcqModal('${s.replace(/'/g, "\\'")}')" class="hover:bg-yellow-200 dark:hover:bg-amber-900/50 cursor-pointer p-0.5 rounded transition block mb-1.5 border-b border-transparent hover:border-amber-400">${s}.</span>`;
                }).join('');
            };
            window.flipPage = function(dir) {
                if(dir === 'next' && currentPage < bookPages.length - 1) currentPage++;
                else if(dir === 'prev' && currentPage > 0) currentPage--;
                renderBookPage();
            };
            window.openMcqModal = function(sentence) {
                document.getElementById('targetSentenceDisplay').innerText = `"${sentence}."`;
                document.getElementById('mcqModal').classList.remove('hidden');
            };
            window.closeMcqModal = function() { document.getElementById('mcqModal').classList.add('hidden'); };
        </script>

        <!-- 4. BOTTOM ROW NAVIGATION -->
        <nav id="adminBottomNav" class="fixed bottom-0 left-0 right-0 z-40 bg-white dark:bg-slate-900 border-t border-slate-200 dark:border-slate-800 px-2 py-3.5 flex justify-around items-center shadow-2xl transition-transform duration-300 lg:pl-80 w-full box-border">
            <button onclick="window.location.href='admin-dashboard.html'" class="text-slate-400 hover:text-rose-500 font-bold text-center flex flex-col items-center space-y-1 transition"><i class="fa-solid fa-house-medical text-base"></i><span class="text-[9px] uppercase tracking-widest font-black">Home</span></button>
            <button onclick="navigateToView('view-subject-hub')" class="text-rose-500 font-black text-center flex flex-col items-center space-y-1"><i class="fa-solid fa-book-open text-base"></i><span class="text-[9px] uppercase tracking-widest font-black">Study</span></button>
            <button onclick="window.location.href='admin-quiz.html'" class="text-slate-400 hover:text-rose-500 font-bold text-center flex flex-col items-center space-y-1 transition"><i class="fa-solid fa-vial-circle-check text-base"></i><span class="text-[9px] uppercase tracking-widest font-black">Test</span></button>
            <button onclick="window.location.href='admin-mocktest.html'" class="text-slate-400 hover:text-rose-500 font-bold text-center flex flex-col items-center space-y-1 transition"><i class="fa-solid fa-stopwatch-20 text-base"></i><span class="text-[9px] uppercase tracking-widest font-black">Mock</span></button>
            <button onclick="window.location.href='admin-students.html'" class="text-slate-400 hover:text-rose-500 font-bold text-center flex flex-col items-center space-y-1 transition"><i class="fa-solid fa-users-gear text-base"></i><span class="text-[9px] uppercase tracking-widest font-black">Students</span></button>
        </nav>
    </div>
</body>
    </html>
