<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>mNEET Admin - NCERT Control Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { darkMode: 'class' }</script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, collection, addDoc } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyApQOM_mtFZ16RiNJEaIUhb4iYFBIBRK58",
            authDomain: "mneet-spark.firebaseapp.com",
            databaseURL: "https://mneet-spark-default-rtdb.firebaseio.com",
            projectId: "mneet-spark",
            storageBucket: "mneet-spark.firebasestorage.app",
            messagingSenderId: "252201633700",
            appId: "1:252201633700:web:1a1e7a2cff1f0b168ea331"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const userDoc = await getDoc(doc(db, "users", user.uid));
                if (userDoc.exists() && userDoc.data().role === 'admin') {
                    document.getElementById('adminNcertArea').classList.remove('hidden');
                } else { window.location.href = "index.html"; }
            } else { window.location.href = "index.html"; }
        });

        // Simulating PDF upload and breaking pages into editable components
        window.processPDFUpload = function() {
            const fileInput = document.getElementById('pdfFile');
            const subject = document.getElementById('subSelect').value;
            const chapter = document.getElementById('chapName').value.trim();

            if(!fileInput.files[0] || !chapter) {
                alert("Please select PDF and type Chapter name.");
                return;
            }

            // Simulate parsing text arrays from PDF file pages safely
            document.getElementById('processingStatus').innerText = "⏳ Extracting layout vectors and texts...";
            
            setTimeout(async () => {
                const generatedPages = [
                    "The living world is rich in biodiversity. Organisms are classified scientifically. Taxonomy helps in biological identification.",
                    "Cell is the basic structural unit of life. All living entities are composed of complex membranes. Mitosis controls replication cells."
                ];

                await setDoc(doc(db, "ncert_books", `${subject}_${chapter.replace(/\s+/g, '_')}`), {
                    subject: subject,
                    chapterName: chapter,
                    pages: generatedPages,
                    createdAt: new Date().toISOString()
                });

                document.getElementById('processingStatus').innerText = "✅ Book Deployed perfectly!";
                alert("Book Layout Synced to database!");
            }, 2500);
        };
    </script>
</head>        <div class="max-w-3xl w-full mx-auto p-4 md:p-6 space-y-6 flex-1">
            <div class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 p-5 rounded-3xl shadow-sm space-y-4">
                <h3 class="text-xs font-black tracking-widest uppercase text-slate-400"><i class="fa-solid fa-file-pdf mr-1"></i> Upload & Vectorize Textbook PDF</h3>
                
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-3 text-xs font-bold">
                    <div>
                        <label class="block mb-1 text-slate-400">Select Subject</label>
                        <select id="subSelect" class="w-full bg-slate-100 dark:bg-slate-950 border border-slate-200 dark:border-slate-800 rounded-xl p-2.5 text-slate-700 dark:text-slate-300 focus:outline-none">
                            <option value="biology">Biology Arena</option>
                            <option value="chemistry">Chemistry Hub</option>
                            <option value="physics">Physics Core</option>
                        </select>
                    </div>
                    <div>
                        <label class="block mb-1 text-slate-400">Chapter Name</label>
                        <input type="text" id="chapName" class="w-full bg-slate-100 dark:bg-slate-950 border border-slate-200 dark:border-slate-800 rounded-xl p-2.5 focus:outline-none" placeholder="e.g. The Living World">
                    </div>
                </div>

                <div>
                    <label class="block mb-1 text-xs text-slate-400 font-bold">Upload RAW Textbook Document</label>
                    <input type="file" id="pdfFile" accept=".pdf" class="w-full bg-slate-100 dark:bg-slate-950 border border-slate-200 dark:border-slate-800 rounded-xl p-3 text-xs focus:outline-none">
                </div>

                <div class="pt-2">
                    <button onclick="processPDFUpload()" class="bg-emerald-500 hover:bg-emerald-600 text-white font-black text-xs px-5 py-3 rounded-xl transition shadow active:scale-95">Deconstruct & Sync to Database</button>
                    <p id="processingStatus" class="text-xs text-sky-500 font-bold mt-2"></p>
                </div>
            </div>

            <!-- Suggestion Content Tagging simulation module -->
            <div class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 p-5 rounded-3xl shadow-sm space-y-3">
                <h3 class="text-xs font-black tracking-widest uppercase text-slate-400"><i class="fa-solid fa-tags mr-1"></i> Smart Mapping Workspace</h3>
                <p class="text-xs text-slate-400 leading-relaxed">Once uploaded, paragraphs will layout into active nodes. Select lines within sentences to lock specific PYQ tags (e.g., NEET 2024 Line) or bind live question tokens instantly to database records.</p>
            </div>
        </div>

        <nav id="adminBottomNav" class="fixed bottom-0 left-0 right-0 z-40 bg-white dark:bg-slate-900 border-t border-slate-200 dark:border-slate-800 px-2 py-3.5 flex justify-around items-center shadow-2xl lg:pl-80 w-full box-border">
            <button onclick="window.location.href='admin-dashboard.html'" class="text-slate-400 text-center flex flex-col items-center space-y-1"><i class="fa-solid fa-house-medical text-base"></i><span class="text-[9px] uppercase tracking-widest font-black">Home</span></button>
            <button onclick="window.location.href='admin-ncert.html'" class="text-rose-500 font-black text-center flex flex-col items-center space-y-1"><i class="fa-solid fa-book-open text-base"></i><span class="text-[9px] uppercase tracking-widest font-black">Study</span></button>
            <button onclick="window.location.href='admin-quiz.html'" class="text-slate-400 hover:text-rose-500 font-bold text-center flex flex-col items-center space-y-1 transition"><i class="fa-solid fa-vial-circle-check text-base"></i><span class="text-[9px] uppercase tracking-widest font-black">Test</span></button>
            <button onclick="window.location.href='admin-mocktest.html'" class="text-slate-400 hover:text-rose-500 font-bold text-center flex flex-col items-center space-y-1 transition"><i class="fa-solid fa-stopwatch-20 text-base"></i><span class="text-[9px] uppercase tracking-widest font-black">Mock</span></button>
            <button onclick="window.location.href='admin-students.html'" class="text-slate-400 hover:text-rose-500 font-bold text-center flex flex-col items-center space-y-1 transition"><i class="fa-solid fa-users-gear text-base"></i><span class="text-[9px] uppercase tracking-widest font-black">Students</span></button>
        </nav>
    </div>
