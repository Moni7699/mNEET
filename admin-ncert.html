<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>mNEET Admin - NCERT Studio Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, deleteDoc, doc, updateDoc } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyApQOM_mtFZ16RiNJEaIUhb4iYFBIBRK58",
            authDomain: "mneet-spark.firebaseapp.com",
            databaseURL: "https://mneet-spark-default-rtdb.firebaseio.com",
            projectId: "mneet-spark",
            storageBucket: "mneet-spark.firebasestorage.app",
            messagingSenderId: "252201633700",
            appId: "1:252201633700:web:1a1e7a2cff1f0b168ea331"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Subjects CRUD
        window.createSubject = async () => {
            const name = document.getElementById('subjectInput').value.trim();
            if(!name) return;
            await addDoc(collection(db, "subjects"), { name, createdAt: Date.now(), hidden: false });
            document.getElementById('subjectInput').value = "";
        };

        onSnapshot(query(collection(db, "subjects"), orderBy("createdAt", "desc")), (snapshot) => {
            const container = document.getElementById('subjectListNode');
            container.innerHTML = "";
            snapshot.forEach(doc => {
                const s = doc.data();
                container.innerHTML += `
                    <div class="bg-white dark:bg-slate-900 border ${s.hidden ? 'opacity-40' : ''} border-slate-200 dark:border-slate-800 rounded-2xl p-4 flex justify-between items-center shadow-sm">
                        <div class="flex items-center space-x-3 cursor-pointer flex-1" onclick="loadChapters('${doc.id}', '${s.name}')">
                            <span class="font-black text-xs md:text-sm text-slate-900 dark:text-white">${s.name}</span>
                        </div>
                        <div class="flex items-center space-x-1">
                            <button onclick="deleteDoc(doc(db, 'subjects', '${doc.id}'))" class="bg-rose-500 text-white p-2 rounded-xl text-[10px]"><i class="fa-solid fa-trash"></i></button>
                        </div>
                    </div>
                `;
            });
        });

        // Navigation Controllers
        window.loadChapters = (subId, subName) => {
            document.getElementById('currentSubjectTitle').innerText = subName;
            document.getElementById('activeSubId').value = subId;
            navigateToView('view-chapter-hub');
        };

        window.navigateToView = (viewId) => {
            ['view-subject-hub', 'view-chapter-hub', 'view-book-canvas'].forEach(v => document.getElementById(v).classList.add('hidden'));
            document.getElementById(viewId).classList.remove('hidden');
        };
    </script>
</head>
<body class="bg-slate-50 dark:bg-slate-950 text-slate-800 dark:text-slate-100 min-h-screen">
    <div id="adminNcertPortal" class="min-h-screen flex flex-col">
        <!-- VIEW 1: SUBJECT HUB -->
        <div id="view-subject-hub" class="w-full flex-1 p-4 md:p-6 space-y-6">
            <header class="flex justify-between items-center mb-6">
                <button onclick="window.location.href='admin-dashboard.html'" class="text-slate-400 p-2"><i class="fa-solid fa-arrow-left"></i></button>
                <h2 class="font-black text-sm">All Subjects</h2>
                <div class="w-8"></div>
            </header>
            <div class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 p-4 rounded-3xl flex gap-3">
                <input type="text" id="subjectInput" class="w-full bg-slate-100 dark:bg-slate-950 rounded-xl px-4 py-3 text-xs font-bold outline-none" placeholder="Enter Subject...">
                <button onclick="createSubject()" class="bg-rose-500 text-white font-black text-xs px-6 py-3 rounded-xl">Create</button>
            </div>
            <div id="subjectListNode" class="space-y-3"></div>
        </div>
                <!-- VIEW 2: CHAPTER HUB -->
        <div id="view-chapter-hub" class="w-full flex-1 p-4 md:p-6 space-y-6 hidden">
            <input type="hidden" id="activeSubId">
            <header class="flex justify-between items-center mb-6">
                <button onclick="navigateToView('view-subject-hub')" class="text-slate-400 p-2"><i class="fa-solid fa-arrow-left"></i></button>
                <h2 id="currentSubjectTitle" class="font-black text-sm">Chapter names</h2>
                <div class="w-8"></div>
            </header>
            <div class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 p-4 rounded-3xl space-y-3">
                <input type="text" id="chapterInput" class="w-full bg-slate-100 dark:bg-slate-950 rounded-xl px-4 py-3 text-xs font-bold outline-none" placeholder="Chapter Name...">
                <button onclick="alert('Chapter created!')" class="w-full bg-rose-500 text-white font-black text-xs py-3 rounded-xl">Create Chapter</button>
            </div>
            <div id="chapterListNode" class="space-y-3">
                <div class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 p-4 rounded-2xl flex justify-between items-center" onclick="navigateToView('view-book-canvas')">
                    <span class="text-xs font-black">Chapter 1: The Living World</span>
                    <button class="bg-sky-500 text-white p-2 rounded-xl text-[10px]"><i class="fa-solid fa-pen"></i></button>
                </div>
            </div>
        </div>

        <!-- VIEW 3: FULL SCREEN PDF CANVAS -->
        <div id="view-book-canvas" class="fixed inset-0 bg-black z-50 hidden flex flex-col">
            <header class="bg-slate-900 text-white px-4 py-3 flex justify-between items-center">
                <button onclick="navigateToView('view-chapter-hub')" class="text-slate-400"><i class="fa-solid fa-chevron-left"></i> Back</button>
                <h2 class="text-xs font-black">Book View</h2>
                <div class="w-8"></div>
            </header>
            
            <!-- Full Screen PDF Container -->
            <div class="flex-1 w-full bg-slate-100 flex items-center justify-center p-2">
                <div class="w-full max-w-2xl h-full bg-white shadow-xl flex flex-col">
                    <div class="flex-1 w-full h-full flex items-center justify-center text-slate-400">
                        <!-- PDF RENDER AREA: Uses responsive embed -->
                        <iframe src="https://www.w3.org/WAI/ER/tests/xhtml/testfiles/resources/pdf/dummy.pdf" class="w-full h-full border-0"></iframe>
                    </div>
                </div>
            </div>
            
            <!-- MCQ Injection floating panel -->
            <div class="bg-white p-4">
                 <button onclick="alert('MCQ Editor Opened!')" class="w-full bg-rose-500 text-white text-xs font-black py-3 rounded-xl">Add MCQ to this page</button>
            </div>
        </div>

        <!-- BOTTOM NAV -->
        <nav id="adminBottomNav" class="fixed bottom-0 left-0 right-0 z-40 bg-white dark:bg-slate-900 border-t p-3 flex justify-around">
            <button onclick="window.location.href='admin-dashboard.html'" class="text-slate-400 text-xs"><i class="fa-solid fa-house"></i></button>
            <button onclick="navigateToView('view-subject-hub')" class="text-rose-500 text-xs"><i class="fa-solid fa-book"></i></button>
            <button onclick="window.location.href='admin-quiz.html'" class="text-slate-400 text-xs"><i class="fa-solid fa-vial"></i></button>
            <button onclick="window.location.href='admin-mocktest.html'" class="text-slate-400 text-xs"><i class="fa-solid fa-stopwatch"></i></button>
        </nav>
    </div>
</body>
            </html>
