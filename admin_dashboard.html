<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>mNEET Admin Panel</title>
    <style>
        :root {
            --bg-color: #0d1424; --card-bg: #172237; --text-color: #ffffff;
            --border-color: #22314d; --accent-color: #f1b80d; --input-bg: #0f1826; --muted-text: #94a3b8;
        }
        [data-theme="light"] {
            --bg-color: #f0f2f5; --card-bg: #ffffff; --text-color: #1e293b;
            --border-color: #cbd5e1; --accent-color: #d9a406; --input-bg: #f8fafc; --muted-text: #64748b;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; transition: background 0.2s, color 0.2s; }
        body { background-color: var(--bg-color); color: var(--text-color); display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        .top-navbar { background-color: var(--card-bg); height: 60px; display: flex; justify-content: space-between; align-items: center; padding: 0 20px; position: fixed; top: 0; left: 0; right: 0; z-index: 100; border-bottom: 1px solid var(--border-color); }
        .nav-btn { background: none; border: none; color: var(--text-color); font-size: 20px; cursor: pointer; padding: 8px; border-radius: 50%; }
        .app-title { font-size: 20px; font-weight: 900; font-style: italic; }
        .app-title span { color: var(--accent-color); }

        .main-content { margin-top: 60px; margin-bottom: 70px; flex: 1; overflow-y: auto; padding: 20px; }
        .bottom-navbar { background-color: var(--card-bg); height: 70px; position: fixed; bottom: 0; left: 0; right: 0; z-index: 100; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid var(--border-color); }
        .bottom-nav-item { display: flex; flex-direction: column; align-items: center; color: var(--muted-text); cursor: pointer; font-size: 10px; font-weight: 600; text-transform: uppercase; }
        .bottom-nav-item.active { color: var(--accent-color); }
        .bottom-nav-item svg { width: 24px; height: 24px; margin-bottom: 4px; fill: currentColor; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div class="top-navbar">
        <button class="nav-btn" id="notiBtn">🔔</button>
        <div class="app-title">M<span>NEET</span></div>
        <button class="nav-btn" id="menuBtn">☰</button>
    </div>

    <div id="notification-tray-target"></div>
    <div id="sidebar-drawer-target"></div>

    <div class="main-content" id="app-dynamic-view-canvas"></div>

    <div class="bottom-navbar">
        <div class="bottom-nav-item active" data-target="home">
            <svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>Home
        </div>
        <div class="bottom-nav-item" data-target="test">
            <svg viewBox="0 0 24 24"><path d="M14 2H6c-1.1 0-1.99.9-1.99 2L4 20c0 1.1.89 2 1.99 2H18c1.1 0 2-.9 2-2V8l-6-6zm2 16H8v-2h8v2zm0-4H8v-2h8v2zm-3-5V3.5L18.5 9H13z"/></svg>Test
        </div>
        <div class="bottom-nav-item" data-target="question">
            <svg viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-2 10h-4v4h-2v-4H7v-2h4V7h2v4h4v2z"/></svg>Question
        </div>
        <div class="bottom-nav-item" data-target="ncert">
            <svg viewBox="0 0 24 24"><path d="M12 11.55C9.64 9.35 6.48 8 3 8v11c3.48 0 6.64 1.35 9 3.55 2.36-2.2 5.52-3.55 9-3.55V8c-3.48 0-6.64 1.35-9 3.55zM12 2c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3z"/></svg>NCERT
        </div>
        <div class="bottom-nav-item" data-target="students">
            <svg viewBox="0 0 24 24"><path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/></svg>Students
        </div>
    </div>

    <script type="module">
        import { initNotification } from './src/admin/notification.js';
        import { initSidebar } from './src/admin/sidebar.js';
        import { renderHome, getSelectedTestId } from './src/admin/viewHome.js';
        import { renderTest } from './src/admin/viewTest.js';
        import { renderQuestion } from './src/admin/viewQuestion.js';
        import { renderNcert } from './src/admin/viewNcert.js';
        import { renderStudents } from './src/admin/viewStudents.js';

        // Load Header Overlay Modules
        initNotification();
        initSidebar();

        const canvas = document.getElementById('app-dynamic-view-canvas');
        const navItems = document.querySelectorAll('.bottom-navbar .bottom-nav-item');

        // Dynamic State Screen View Navigation Manager mapping core routing functions
        function routeTo(target) {
            canvas.innerHTML = ''; // Reset core target space context view area
            const activeTestId = getSelectedTestId();

            if (target === 'home') renderHome(canvas);
            else if (target === 'test') renderTest(canvas);
            else if (target === 'question') renderQuestion(canvas, activeTestId);
            else if (target === 'ncert') renderNcert(canvas, activeTestId);
            else if (target === 'students') renderStudents(canvas, activeTestId);
        }

        navItems.forEach(item => {
            item.addEventListener('click', () => {
                navItems.forEach(i => i.classList.remove('active'));
                item.classList.add('active');
                routeTo(item.getAttribute('data-target'));
            });
        });

        // Initialize Home component rendering on start lifecycle
        routeTo('home');
    </script>
</body>
</html>
