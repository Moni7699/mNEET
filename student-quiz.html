<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>mNEET Student - Test Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getFirestore, collection, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyApQOM_mtFZ16RiNJEaIUhb4iYFBIBRK58",
            authDomain: "mneet-spark.firebaseapp.com",
            databaseURL: "https://mneet-spark-default-rtdb.firebaseio.com",
            projectId: "mneet-spark",
            storageBucket: "mneet-spark.firebasestorage.app",
            messagingSenderId: "252201633700",
            appId: "1:252201633700:web:1a1e7a2cff1f0b168ea331"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let selectedSubjectId = "";
        let selectedChapterId = "";
        let selectedTopicId = "";
        let subStreamUnsubscribe = null;

        window.navigateToStudentTestView = function(viewId) {
            const screens = ['student-view-test-subjects', 'student-view-test-chapters', 'student-view-test-topics', 'student-test-exam-canvas'];
            screens.forEach(s => document.getElementById(s).classList.add('hidden'));
            document.getElementById(viewId).classList.remove('hidden');

            const bottomNav = document.getElementById('studentTestBottomNav');
            if(viewId === 'student-test-exam-canvas') {
                bottomNav.style.display = 'none';
            } else {
                bottomNav.style.display = 'flex';
            }
        };

        window.initStudentTestSubjects = function() {
            onSnapshot(query(collection(db, "quiz_subjects"), orderBy("createdAt", "asc")), (snapshot) => {
                const container = document.getElementById('studentTestSubContainer');
                if(!container) return; container.innerHTML = "";
                snapshot.forEach(docSnap => {
                    const s = docSnap.data(); if(s.hidden) return; 
                    const id = docSnap.id;
                    container.innerHTML += `
                        <div onclick="window.enterStudentTestSubject('${id}', '${s.name.replace(/'/g, "\\'")}')" class="bg-white border border-slate-200 rounded-2xl p-5 flex items-center space-x-4 shadow-sm active:scale-[0.99] transition cursor-pointer hover:border-rose-400">
                            <div class="w-10 h-10 rounded-xl bg-rose-500/10 flex items-center justify-center text-rose-500"><i class="fa-solid fa-folder-open text-lg"></i></div>
                            <span class="font-black text-slate-800 text-sm md:text-base">${s.name}</span>
                        </div>
                    `;
                });
            });
        };

        window.enterStudentTestSubject = function(id, name) {
            selectedSubjectId = id;
            document.getElementById('studentTestChapterHeaderTitle').innerText = name;
            window.navigateToStudentTestView('student-view-test-chapters');
            window.loadStudentTestChapters();
        };

        window.addEventListener('DOMContentLoaded', () => window.initStudentTestSubjects());
                window.loadStudentTestChapters = function() {
            if(subStreamUnsubscribe) subStreamUnsubscribe();
            subStreamUnsubscribe = onSnapshot(query(collection(db, `quiz_subjects/${selectedSubjectId}/chapters`), orderBy("createdAt", "asc")), (snapshot) => {
                const container = document.getElementById('studentTestChapContainer');
                container.innerHTML = "";
                snapshot.forEach(docSnap => {
                    const c = docSnap.data(); if(c.hidden) return;
                    const id = docSnap.id;
                    container.innerHTML += `
                        <div onclick="window.enterStudentTestChapter('${id}', '${c.name.replace(/'/g, "\\'")}')" class="bg-white border border-slate-200 rounded-2xl p-4 flex items-center justify-between shadow-sm active:scale-[0.99] transition cursor-pointer hover:border-purple-400">
                            <span class="font-black text-slate-800 text-xs md:text-sm">${c.name}</span>
                            <i class="fa-solid fa-chevron-right text-slate-400 text-xs"></i>
                        </div>
                    `;
                });
            });
        };

        window.enterStudentTestChapter = function(id, name) {
            selectedChapterId = id;
            document.getElementById('studentTestTopicHeaderTitle').innerText = name;
            window.navigateToStudentTestView('student-view-test-topics');
            window.loadStudentTestTopics();
        };

        window.loadStudentTestTopics = function() {
            onSnapshot(query(collection(db, `quiz_subjects/${selectedSubjectId}/chapters/${selectedChapterId}/topics`), orderBy("createdAt", "asc")), (snapshot) => {
                const container = document.getElementById('studentTestTopicContainer');
                container.innerHTML = "";
                snapshot.forEach(docSnap => {
                    const t = docSnap.data(); if(t.hidden) return;
                    const id = docSnap.id;
                    container.innerHTML += `
                        <div onclick="window.startStudentTopicExam('${id}', '${t.name.replace(/'/g, "\\'")}')" class="bg-white border border-slate-200 rounded-2xl p-4 flex justify-between items-center shadow-sm active:scale-[0.99] cursor-pointer hover:border-emerald-400">
                            <span class="font-black text-xs md:text-sm text-slate-800"><i class="fa-solid fa-tags text-purple-500 mr-2"></i>${t.name}</span>
                            <i class="fa-solid fa-angle-right text-slate-400"></i>
                        </div>
                    `;
                });
            });
        };

        window.startStudentTopicExam = function(id, name) {
            selectedTopicId = id;
            window.navigateToStudentTestView('student-test-exam-canvas');
            document.getElementById('topicExamCanvasTitle').innerText = name;
        };
    </script>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen font-sans select-none antialiased">
    <div id="studentTestAppPortal" class="min-h-screen flex flex-col justify-between overflow-x-hidden">
        
        <!-- SCREEN 1: SUBJECTS -->
        <div id="student-view-test-subjects" class="w-full flex-1 flex flex-col">
            <header class="bg-white border-b border-slate-200 px-4 py-4 sticky top-0 z-40 flex justify-between items-center w-full shadow-sm">
                <button onclick="window.location.href='student-dashboard.html'" class="text-slate-400 p-2"><i class="fa-solid fa-chevron-left text-lg text-slate-600"></i></button>
                <h2 class="font-black text-sm text-slate-800">Test Hub</h2>
                <div class="w-8"></div>
            </header>
            <div class="w-full px-4 py-6 max-w-xl mx-auto space-y-3" id="studentTestSubContainer"></div>
        </div>

        <!-- SCREEN 2: CHAPTERS -->
        <div id="student-view-test-chapters" class="w-full flex-1 flex flex-col hidden">
            <header class="bg-white border-b border-slate-200 px-4 py-4 sticky top-0 z-40 flex items-center justify-between w-full shadow-sm">
                <button onclick="window.navigateToStudentTestView('student-view-test-subjects')" class="text-slate-400 p-2"><i class="fa-solid fa-chevron-left text-lg text-slate-600"></i></button>
                <h2 id="studentTestChapterHeaderTitle" class="font-black text-sm text-slate-800 mx-auto truncate max-w-[180px]">Chapters</h2>
                <div class="w-8"></div>
            </header>
            <div class="w-full px-4 py-6 max-w-xl mx-auto space-y-3" id="studentTestChapContainer"></div>
        </div>

        <!-- SCREEN 3: TOPICS -->
        <div id="student-view-test-topics" class="w-full flex-1 flex flex-col hidden">
            <header class="bg-white border-b border-slate-200 px-4 py-4 sticky top-0 z-40 flex items-center justify-between w-full shadow-sm">
                <button onclick="window.navigateToStudentTestView('student-view-test-chapters')" class="text-slate-400 p-2"><i class="fa-solid fa-chevron-left text-lg text-slate-600"></i></button>
                <h2 id="studentTestTopicHeaderTitle" class="font-black text-sm text-slate-800 mx-auto truncate max-w-[180px]">Topics</h2>
                <div class="w-8"></div>
            </header>
            <div class="w-full px-4 py-6 max-w-xl mx-auto space-y-3" id="studentTestTopicContainer"></div>
        </div>

        <!-- SCREEN 4: EXAM CANVAS -->
        <div id="student-test-exam-canvas" class="fixed inset-0 bg-slate-900 z-50 hidden flex flex-col w-screen h-screen overflow-hidden">
            <header class="bg-slate-950 text-white px-4 py-3 flex justify-between items-center border-b border-slate-800 w-full h-12 flex-shrink-0">
                <button onclick="window.navigateToStudentTestView('student-view-test-topics')" class="text-slate-400 font-bold text-xs"><i class="fa-solid fa-chevron-left"></i> Back</button>
                <h2 id="topicExamCanvasTitle" class="text-xs font-black uppercase tracking-wider text-slate-400 truncate max-w-[180px]">Evaluation Canvas</h2>
                <div class="w-8"></div>
            </header>
            <div class="flex-1 w-full bg-slate-800 p-4 overflow-y-auto box-border flex flex-col items-center">
                <div class="bg-white border border-slate-200 w-full max-w-xl rounded-3xl p-6 space-y-5 shadow-2xl text-xs font-bold text-slate-700">
                    <p class="text-slate-900 text-sm font-black leading-relaxed">Which specific enzyme matrix triggers the primary transcription phase during cellular synthesis mechanics?</p>
                    <div class="space-y-2.5 pt-1">
                        <label class="flex items-center space-x-3 p-3 bg-slate-50 border border-slate-200 rounded-xl cursor-pointer hover:border-rose-400 transition"><input type="radio" name="tMcq" class="accent-rose-500"> <span class="text-slate-800 font-bold">A) RNA Polymerase Complex</span></label>
                        <label class="flex items-center space-x-3 p-3 bg-slate-50 border border-slate-200 rounded-xl cursor-pointer hover:border-rose-400 transition"><input type="radio" name="tMcq" class="accent-rose-500"> <span class="text-slate-800 font-bold">B) DNA Ligase Matrix Binder</span></label>
                    </div>
                    <div class="grid grid-cols-2 gap-3 pt-3 border-t">
                        <button onclick="document.getElementById('tSol').classList.toggle('hidden')" class="bg-slate-100 text-slate-700 py-3 rounded-xl font-black text-center transition">View Solution</button>
                        <button onclick="alert('Submission captured!'); window.navigateToStudentTestView('student-view-test-topics');" class="bg-rose-500 text-white py-3 rounded-xl font-black text-center shadow">Submit Answer</button>
                    </div>
                    <div id="tSol" class="hidden p-4 bg-emerald-50 text-emerald-800 border border-emerald-200 rounded-xl font-medium mt-2">
                        📌 <strong>Explanation:</strong> Cellular transcription processes absolutely depend on active RNA Polymerase holoenzymes.
                    </div>
                </div>
            </div>
        </div>

        <!-- BOTTOM NAV STRAP PERFECTLY SYNCED -->
        <nav id="studentTestBottomNav" class="fixed bottom-0 left-0 right-0 z-40 bg-white border-t border-slate-200 px-2 py-3.5 flex justify-around items-center shadow-2xl w-full box-border">
            <button onclick="window.location.href='student-dashboard.html'" class="text-slate-400 hover:text-rose-500 font-bold text-center flex flex-col items-center space-y-1"><i class="fa-solid fa-house-user text-base"></i><span class="text-[9px] font-black">Home</span></button>
            <button onclick="window.location.href='student-ncert.html'" class="text-slate-400 hover:text-rose-500 font-bold text-center flex flex-col items-center space-y-1"><i class="fa-solid fa-book-open text-base"></i><span class="text-[9px] font-black">Study</span></button>
            <button onclick="window.navigateToStudentTestView('student-view-test-subjects')" class="text-rose-500 font-black text-center flex flex-col items-center space-y-1"><i class="fa-solid fa-vial-circle-check text-base"></i><span class="text-[9px] font-black">Test</span></button>
            <button onclick="window.location.href='student-mocktest.html'" class="text-slate-400 hover:text-rose-500 font-bold text-center flex flex-col items-center space-y-1"><i class="fa-solid fa-stopwatch-20 text-base"></i><span class="text-[9px] font-black">Mock</span></button>
            <button onclick="window.location.href='student-profile.html'" class="text-slate-400 hover:text-rose-500 font-bold text-center flex flex-col items-center space-y-1"><i class="fa-solid fa-user-gear text-base"></i><span class="text-[9px] font-black">Students</span></button>
        </nav>
    </div>
</body>
</html>
