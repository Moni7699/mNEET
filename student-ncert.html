<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>mNEET Reader - Interactive Flipbook</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getAuth } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyApQOM_mtFZ16RiNJEaIUhb4iYFBIBRK58",
            authDomain: "mneet-spark.firebaseapp.com",
            databaseURL: "https://mneet-spark-default-rtdb.firebaseio.com",
            projectId: "mneet-spark",
            storageBucket: "mneet-spark.firebasestorage.app",
            messagingSenderId: "252201633700",
            appId: "1:252201633700:web:1a1e7a2cff1f0b168ea331"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let bookPages = [
            "The living world is rich in biodiversity. Organisms are classified scientifically using rigorous rules. Taxonomy helps in absolute biological identification across generations.",
            "Cell is the basic structural unit of life. All living entities are composed of complex plasma membranes. Mitosis controls replication cells perfectly."
        ];
        let currentPageIndex = 0;
        let speechSynth = window.speechSynthesis;
        let speechUtterance = null;
        let isLockMode = false;

        window.loadChapterBook = async function() {
            const path = "biology_The_Living_World"; 
            try {
                const bookDoc = await getDoc(doc(db, "ncert_books", path));
                if(bookDoc.exists()) {
                    bookPages = bookDoc.data().pages || bookPages;
                }
            } catch(e) { console.log("Using core bundle fallbacks."); }
            renderPage();
        };

        function renderPage() {
            document.getElementById('pageNumber').innerText = `Page ${currentPageIndex + 1} of ${bookPages.length}`;
            const container = document.getElementById('pageBodyContent');
            
            // Render text with specific inline highlighting span triggers
            container.innerHTML = bookPages[currentPageIndex].split('. ').map((sentence, idx) => {
                return `<span class="sentence-node cursor-pointer transition p-0.5 rounded" id="s-${idx}" onclick="handleSentenceClick(this)">${sentence}.</span>`;
            }).join(' ');
        }

        window.turnPage = function(direction) {
            if(direction === 'next' && currentPageIndex < bookPages.length - 1) {
                currentPageIndex++;
                renderPage();
                if(speechSynth.speaking) playAIReader();
            } else if(direction === 'prev' && currentPageIndex > 0) {
                currentPageIndex--;
                renderPage();
                if(speechSynth.speaking) playAIReader();
            }
        };

        window.playAIReader = function() {
            speechSynth.cancel();
            const rawText = bookPages[currentPageIndex];
            speechUtterance = new SpeechSynthesisUtterance(rawText);
            
            const speed = parseFloat(document.getElementById('voiceSpeed').value);
            speechUtterance.rate = speed;

            speechUtterance.onend = () => {
                if(currentPageIndex < bookPages.length - 1) {
                    window.turnPage('next');
                }
            };

            speechSynth.speak(speechUtterance);
        };

        window.stopAIReader = () => speechSynth.cancel();

        window.togglePageLock = function() {
            isLockMode = !isLockMode;
            const btn = document.getElementById('lockModeBtn');
            if(isLockMode) {
                btn.className = "bg-rose-500 text-white text-xs px-3 py-1.5 rounded-xl font-black";
                btn.innerHTML = '<i class="fa-solid fa-lock mr-1"></i> Read Locked';
            } else {
                btn.className = "bg-slate-100 text-slate-700 text-xs px-3 py-1.5 rounded-xl font-black border";
                btn.innerHTML = '<i class="fa-solid fa-lock-open mr-1"></i> Edit Mode';
            }
        };

        window.handleSentenceClick = function(element) {
            if(isLockMode) return; // Prevent adjustments if safety configuration is active
            element.classList.toggle('bg-yellow-200'); // Highlight effect trigger toggle
        };

        window.switchVisionMode = function(mode) {
            const body = document.getElementById('readerCanvasFrame');
            if(mode === 'care') {
                body.style.backgroundColor = '#f4ecd8';
                body.style.color = '#433422';
            } else {
                body.style.backgroundColor = '#ffffff';
                body.style.color = '#1e293b';
            }
        };

        window.addEventListener('DOMContentLoaded', () => { window.loadChapterBook(); });
    </script>
</head>
<body class="bg-slate-100 min-h-screen text-slate-800 antialiased flex flex-col justify-between">
  
    <!-- HEADER HUB (PURE WHITE STYLE CONTROL ONLY) -->
    <header class="bg-white border-b border-slate-200 px-4 py-3 sticky top-0 z-40 flex justify-between items-center shadow-sm">
        <div class="flex items-center space-x-2">
            <button onclick="window.location.href='student-dashboard.html'" class="text-slate-400 p-2"><i class="fa-solid fa-chevron-left"></i></button>
            <div>
                <h2 class="font-black text-xs md:text-sm text-slate-900">The Living World</h2>
                <p class="text-[9px] text-slate-400 font-bold uppercase tracking-wider">NCERT Flipbook Engine</p>
            </div>
        </div>
        
        <!-- Safety Guard accidental touch locker toggles -->
        <button id="lockModeBtn" onclick="togglePageLock()" class="bg-slate-100 text-slate-700 text-xs px-3 py-1.5 rounded-xl font-black border transition active:scale-95">
            <i class="fa-solid fa-lock-open mr-1"></i> Edit Mode
        </button>
    </header>

    <!-- CORE ADAPTIVE FLIPBOOK CANVAS FRAME -->
    <main class="flex-1 w-full max-w-2xl mx-auto p-4 flex flex-col justify-center">
        
        <!-- Vision Mode Switches Panel Options -->
        <div class="flex justify-end space-x-2 mb-3">
            <button onclick="switchVisionMode('white')" class="bg-white border text-[10px] font-bold px-2.5 py-1 rounded-lg">☀️ Pure White</button>
            <button onclick="switchVisionMode('care')" class="bg-[#f4ecd8] border text-[10px] font-bold text-[#433422] px-2.5 py-1 rounded-lg">👁️ Eye Care Mode</button>
        </div>

        <!-- The Real Book Page Layer -->
        <div id="readerCanvasFrame" class="bg-white border border-slate-200 shadow-xl rounded-3xl p-6 md:p-8 min-h-[380px] flex flex-col justify-between transition-all duration-300">
            <!-- Dynamic sentence loading array portal -->
            <div id="pageBodyContent" class="text-base md:text-lg font-serif leading-loose tracking-wide select-text space-y-2">
                Loading encrypted vectors...
            </div>
            
            <!-- Page Footer Status Identifier Label -->
            <div class="border-t pt-4 mt-6 flex justify-between items-center text-slate-400 text-xs font-bold font-mono">
                <span id="pageNumber">Page 1 of --</span>
                <span class="text-sky-500"><i class="fa-solid fa-shield-check"></i> Verified Layout</span>
            </div>
        </div>

        <!-- AI Voice Controller Grid Bar Panel Tools -->
        <div class="bg-white border border-slate-200 rounded-2xl p-4 mt-4 shadow-sm space-y-3">
            <div class="flex flex-wrap items-center justify-between gap-2">
                <div class="flex items-center space-x-2">
                    <button onclick="playAIReader()" class="bg-sky-500 hover:bg-sky-600 text-white w-9 h-9 rounded-full flex items-center justify-center transition shadow shadow-sky-500/10 active:scale-90"><i class="fa-solid fa-play text-sm ml-0.5"></i></button>
                    <button onclick="stopAIReader()" class="bg-slate-100 hover:bg-slate-200 text-slate-600 w-9 h-9 rounded-full flex items-center justify-center transition border active:scale-90"><i class="fa-solid fa-stop text-xs"></i></button>
                    <span class="text-[10px] font-black tracking-widest text-slate-400 uppercase">AI Audio Reader</span>
                </div>
                
                <div class="flex items-center space-x-1">
                    <label class="text-[10px] font-black text-slate-400 uppercase">Speed:</label>
                    <select id="voiceSpeed" class="bg-slate-100 border text-xs font-bold rounded-lg p-1 focus:outline-none">
                        <option value="0.75">0.75x</option>
                        <option value="1.0" selected>1.0x (Norm)</option>
                        <option value="1.25">1.25x</option>
                        <option value="1.5">1.5x</option>
                        <option value="2.0">2.0x</option>
                    </select>
                </div>
            </div>
        </div>
    </main>

    <!-- 4. BOTTOM FLIP CONTROLS -->
    <footer class="bg-white border-t border-slate-200 p-4 sticky bottom-0 z-40 flex justify-between items-center shadow-lg">
        <button onclick="turnPage('prev')" class="bg-slate-100 hover:bg-slate-200 border text-slate-700 px-4 py-2 text-xs font-black rounded-xl transition active:scale-95"><i class="fa-solid fa-chevron-left mr-1"></i> Previous</button>
        
        <!-- Interactive Tool Links simulated blocks -->
        <div class="flex space-x-2 text-slate-400 text-sm">
            <button onclick="alert('Note Pad module setup complete.')" class="hover:text-sky-500 p-1"><i class="fa-solid fa-note-sticky"></i></button>
            <button onclick="alert('MCQs connected successfully.')" class="hover:text-purple-500 p-1"><i class="fa-solid fa-circle-question"></i></button>
        </div>

        <button onclick="turnPage('next')" class="bg-slate-900 hover:bg-slate-800 text-white px-4 py-2 text-xs font-black rounded-xl transition active:scale-95">Next Page <i class="fa-solid fa-chevron-right ml-1"></i></button>
    </footer>

</body>
</html>
