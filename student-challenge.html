<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1v1 Combat - mNEET</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { darkMode: 'class' }</script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-50 dark:bg-slate-950 text-slate-800 dark:text-slate-100 min-h-screen">
    <header class="bg-white dark:bg-slate-900 border-b border-slate-200 dark:border-slate-800 px-6 py-4 flex items-center space-x-3">
        <button onclick="window.location.href='student-dashboard.html'" class="text-slate-400 text-sm font-bold"><i class="fa-solid fa-arrow-left"></i> Back</button>
        <h2 class="font-black text-lg text-slate-900 dark:text-white">1v1 Peer Combat Arena</h2>
    </header>
    <div class="max-w-md mx-auto p-6 text-center space-y-6 mt-10">
        <div class="text-5xl">⚔️</div>
        <div class="space-y-1">
            <h3 class="text-xl font-black">Invite Peers to Live Duels</h3>
            <p class="text-xs text-slate-400">Admin sets dedicated battle questions. Limit: 3 matches daily.</p>
        </div>
        <div class="flex gap-3"><button class="w-full bg-purple-500 text-white font-bold py-3 text-xs rounded-xl uppercase tracking-wider">Create Room Code</button></div>
    </div>
</body>
</html>
