<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>mNEET - Sign In Gateway</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --gold: #F3B917;
            --bg-app: #090D16;
            --bg-surface: #131A26;
            --bg-input: #0A111E;
            --text-title: #FFFFFF;
            --text-para: #94A3B8;
            --border-line: #1E293B;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: var(--bg-app); color: var(--text-title);
            font-family: system-ui, -apple-system, sans-serif;
            display: flex; align-items: center; justify-content: center;
            width: 100vw; height: 100vh; overflow-y: auto; padding: 20px 0;
        }
        .gateway-card {
            width: 90%; max-width: 400px; background: var(--bg-surface);
            border-radius: 24px; padding: 36px 28px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5); border: 1px solid var(--border-line);
        }
        .logo-box { font-weight: 900; font-size: 32px; margin-bottom: 6px; text-align: center; }
        .logo-box span.m { color: var(--text-title); }
        .logo-box span.neet { color: var(--gold); }
        .tag-sub { font-size: 13px; color: var(--text-para); margin-bottom: 28px; text-align: center; }
        
        .form-title { font-size: 22px; font-weight: 800; margin-bottom: 24px; text-align: left; color: #FFFFFF; }
        
        .form-group { text-align: left; margin-bottom: 16px; }
        .form-label { display: block; font-size: 12px; font-weight: 700; margin-bottom: 8px; color: var(--text-para); text-transform: uppercase; letter-spacing: 0.5px; }
        
        .input-container { position: relative; width: 100%; }
        .input-container i { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--text-para); font-size: 14px; }
        
        .form-input { width: 100%; padding: 14px 14px 14px 42px; border: 1px solid var(--border-line); border-radius: 12px; background: var(--bg-input); color: #FFFFFF; font-size: 14px; outline: none; font-weight: 600; transition: 0.2s; }
        .form-input:focus { border-color: var(--gold); box-shadow: 0 0 0 2px rgba(243, 185, 23, 0.1); }
        
        .btn-submit-action { width: 100%; background: var(--gold); color: #000000; font-weight: 900; padding: 15px; border: none; border-radius: 12px; text-transform: uppercase; cursor: pointer; font-size: 15px; margin-top: 14px; letter-spacing: 0.5px; transition: 0.2s; }
        .btn-submit-action:hover { background: #e0aa12; }
        
        .switch-prompt { font-size: 13px; color: var(--text-para); margin-top: 24px; font-weight: 600; text-align: center; }
        .switch-prompt span { color: var(--gold); cursor: pointer; text-decoration: none; font-weight: 700; margin-left: 4px; }
    </style>
</head>
<body>

    <div class="gateway-card">
        <div class="logo-box"><span class="m">m</span><span class="neet">NEET</span></div>
        <p class="tag-sub">Your Ultimate Medical Prep Companion</p>
        
        <h2 class="form-title" id="formCurrentHeading">Sign In to Your Account</h2>

        <form id="authCoreForm">
            <div class="form-group signup-only" style="display: none;">
                <label class="form-label">Full Name</label>
                <div class="input-container">
                    <i class="fas fa-user"></i>
                    <input type="text" id="regName" class="form-input" placeholder="Enter your full name">
                </div>
            </div>

            <div class="form-group">
                <label class="form-label">Gmail Address</label>
                <div class="input-container">
                    <i class="fas fa-envelope"></i>
                    <input type="email" id="regEmail" class="form-input" placeholder="Enter your registered email" required>
                </div>
            </div>

            <div class="form-group signup-only" style="display: none;">
                <label class="form-label">Phone Number</label>
                <div class="input-container">
                    <i class="fas fa-phone"></i>
                    <input type="text" id="regPhone" class="form-input" placeholder="Enter mobile number">
                </div>
            </div>

            <div class="form-group">
                <label class="form-label">Password</label>
                <div class="input-container">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="regPassword" class="form-input" placeholder="Enter your account password" required>
                </div>
            </div>

            <div class="form-group signup-only" style="display: none;">
                <label class="form-label">City</label>
                <div class="input-container">
                    <i class="fas fa-map-marker-alt"></i>
                    <input type="text" id="regCity" class="form-input" placeholder="Enter your city">
                </div>
            </div>

            <button type="submit" class="btn-submit-action" id="submitActionBtn">Sign In</button>
        </form>

        <p class="switch-prompt" id="switchTextPrompt">Don't have an account?<span id="triggerSwitchSpan">Sign Up</span></p>
    </div>

    <script type="module">
        import { db, ref, set, push, onValue } from './firebase-config.js';

        const formHeading = document.getElementById('formCurrentHeading');
        const signupFields = document.querySelectorAll('.signup-only');
        const submitBtn = document.getElementById('submitActionBtn');
        const switchSpan = document.getElementById('triggerSwitchSpan');
        const switchText = document.getElementById('switchTextPrompt');
        const form = document.getElementById('authCoreForm');

        let isSignUpMode = false;
        const STUDENT_DB_NODE = 'mneet_student_directory_db';
        
        // 🏛️ CENTRAL MANAGEMENT SECURITY RULES
        const MASTER_ADMIN_GMAIL = "admin@mneet.com";

        switchSpan.addEventListener('click', () => {
            isSignUpMode = !isSignUpMode;
            if (isSignUpMode) {
                formHeading.innerText = "Create Your Account";
                signupFields.forEach(el => el.style.display = 'block');
                submitBtn.innerText = "Register Now";
                switchText.innerHTML = `Already have an account?<span id="triggerSwitchSpan">Sign In</span>`;
            } else {
                formHeading.innerText = "Sign In to Your Account";
                signupFields.forEach(el => el.style.display = 'none');
                submitBtn.innerText = "Sign In";
                switchText.innerHTML = `Don't have an account?<span id="triggerSwitchSpan">Sign Up</span>`;
            }
            document.getElementById('triggerSwitchSpan').addEventListener('click', () => switchSpan.click());
        });

        form.addEventListener('submit', function(e) {
            e.preventDefault();
            
            const emailValue = document.getElementById('regEmail').value.trim();
            const passwordValue = document.getElementById('regPassword').value;

            // ─── 1. REGISTER PIPELINE ───
            if (isSignUpMode) {
                const nameValue = document.getElementById('regName').value.trim();
                const phoneValue = document.getElementById('regPhone').value.trim();
                const cityValue = document.getElementById('regCity').value.trim();

                const checkRef = ref(db, STUDENT_DB_NODE);
                onValue(checkRef, (snapshot) => {
                    const data = snapshot.val();
                    let emailExists = false;

                    if (data) {
                        for (let id in data) {
                            if (data[id].email === emailValue) { emailExists = true; break; }
                        }
                    }

                    if (emailExists) {
                        alert("This Gmail address is already registered!");
                    } else {
                        let newStudent = {
                            name: nameValue,
                            email: emailValue,
                            phone: phoneValue,
                            password: passwordValue,
                            city: cityValue,
                            status: "Active",
                            batchId: "-KGx_FallbackDefaultNodeKey"
                        };

                        const newPushRef = push(ref(db, STUDENT_DB_NODE));
                        set(newPushRef, newStudent).then(() => {
                            alert("Account created successfully!");
                            localStorage.setItem('mneet_student_session_token', JSON.stringify(newStudent));
                            window.location.href = 'student_dashboard.html';
                        });
                    }
                }, { onlyOnce: true });

            // ─── 2. MULTI-TERMINAL AUTOMATED SIGN IN ROUTER ───
            } else {
                // A. MASTER ROOT ADMIN DETECTOR BYPASS
                if (emailValue === MASTER_ADMIN_GMAIL && passwordValue === "master2026") {
                    localStorage.setItem('mneet_admin_session', true);
                    window.location.href = 'admin_dashboard.html';
                    return;
                }

                // B. FACULTY/TEACHER SUB-DOMAIN MATCH ENGINES (Auto-Detect Logic)
                if (emailValue.endsWith("@mneetteacher.com")) {
                    // Standard verification bypass token mapping for teachers
                    alert("Faculty configuration token validated successfully!");
                    let facultySubject = "Botany"; 
                    if(emailValue.includes("zoology")) facultySubject = "Zoology";
                    if(emailValue.includes("physics")) facultySubject = "Physics";
                    
                    let teacherSession = { 
                        name: "Specialized Professor Panel", 
                        subject: facultySubject, 
                        role: "Senior Lecturer" 
                    };
                    localStorage.setItem('mneet_teacher_logged_session', JSON.stringify(teacherSession));
                    window.location.href = 'teacher_dashboard.html';
                    return;
                }

                // C. PREMIUM SYSTEM STUDENT SERVER LOOKUP
                const loginSearchRef = ref(db, STUDENT_DB_NODE);
                onValue(loginSearchRef, (snapshot) => {
                    const map = snapshot.val();
                    let matchedUser = null;

                    if (map) {
                        for (let node in map) {
                            if (map[node].email === emailValue && map[node].password === passwordValue) {
                                matchedUser = map[node];
                                break;
                            }
                        }
                    }

                    if (matchedUser) {
                        if (matchedUser.status === 'Blocked') {
                            alert("Access Denied! Your account has been suspended.");
                        } else {
                            localStorage.setItem('mneet_student_session_token', JSON.stringify(matchedUser));
                            window.location.href = 'student_dashboard.html';
                        }
                    } else {
                        alert("Invalid Gmail or Password profile keys combination!");
                    }
                }, { onlyOnce: true });
            }
        });
    </script>
</body>
</html>
