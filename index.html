<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>mNEET - Authentication</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #0d1424; /* Explicit dark background color matching image */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .auth-container {
            background-color: #172237; /* Rounded inner card color matching image */
            width: 100%;
            max-width: 400px;
            padding: 40px 30px;
            border-radius: 40px; /* Deep rounded corners from image */
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
            text-align: center;
        }

        .logo {
            font-size: 38pt;
            font-weight: 900;
            font-style: italic;
            color: #ffffff;
            margin-bottom: 35px;
            letter-spacing: -1px;
        }

        .logo span {
            color: #f1b80d; /* Golden amber/yellow accent from user image */
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .form-group input {
            width: 100%;
            padding: 16px 20px;
            background-color: #0f1826; /* Darker input fields matching image */
            border: 1px solid #22314d;
            border-radius: 15px;
            color: #ffffff;
            font-size: 11pt;
            outline: none;
            transition: all 0.3s ease;
        }

        .form-group input::placeholder {
            color: #64748b;
        }

        .form-group input:focus {
            border-color: #f1b80d;
            box-shadow: 0 0 8px rgba(241, 184, 13, 0.2);
        }

        .btn-submit {
            width: 100%;
            padding: 16px;
            background-color: #f1b80d; /* Amber/Yellow submit button from image */
            border: none;
            border-radius: 15px;
            color: #0d1424;
            font-size: 12pt;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            margin-top: 10px;
            transition: background-color 0.2s ease;
        }

        .btn-submit:hover {
            background-color: #d9a406;
        }

        .switch-text {
            color: #94a3b8;
            font-size: 9.5pt;
            margin-top: 25px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .switch-text span {
            color: #f1b80d;
            font-weight: bold;
            cursor: pointer;
            margin-left: 5px;
        }

        .switch-text span:hover {
            text-decoration: underline;
        }

        /* Error/Success Messages */
        .message {
            padding: 12px;
            border-radius: 10px;
            font-size: 10pt;
            margin-bottom: 20px;
            display: none;
        }
        .error-msg {
            background-color: rgba(239, 68, 68, 0.15);
            color: #ef4444;
            border: 1px solid rgba(239, 68, 68, 0.3);
        }
        .success-msg {
            background-color: rgba(34, 197, 94, 0.15);
            color: #22c55e;
            border: 1px solid rgba(34, 197, 94, 0.3);
        }

        /* Utility classes to toggle screens */
        .hidden {
            display: none;
        }
    </style>
</head>
<body>

    <div class="auth-container">
        <!-- Logo Header -->
        <div class="logo">M<span>NEET</span></div>

        <!-- Global Alert Box -->
        <div id="alertBox" class="message"></div>

        <!-- ================= SIGN IN FORM ================= -->
        <form id="signInForm">
            <div class="form-group">
                <input type="email" id="loginEmail" placeholder="ENTER YOUR GMAIL" required>
            </div>
            <div class="form-group">
                <input type="password" id="loginPassword" placeholder="ENTER PASSWORD" required>
            </div>
            <button type="submit" class="btn-submit">SIGN IN</button>
            <div class="switch-text">
                NEW SURGEON? <span id="toSignUp">SIGN UP</span>
            </div>
        </form>

        <!-- ================= SIGN UP FORM ================= -->
        <form id="signUpForm" class="hidden">
            <div class="form-group">
                <input type="text" id="regName" placeholder="FULL NAME" required>
            </div>
            <div class="form-group">
                <input type="email" id="regEmail" placeholder="GMAIL ADDRESS" required>
            </div>
            <div class="form-group">
                <input type="tel" id="regPhone" placeholder="PHONE NUMBER" required>
            </div>
            <div class="form-group">
                <input type="text" id="regCity" placeholder="CITY / TOWN" required>
            </div>
            <div class="form-group">
                <input type="password" id="regPassword" placeholder="CREATE PASSWORD" required>
            </div>
            <button type="submit" class="btn-submit">CREATE ACCOUNT</button>
            <div class="switch-text">
                ALREADY A MEMBER? <span id="toSignIn">SIGN IN</span>
            </div>
        </form>
    </div>

    <!-- Firebase App & Database Implementation Logic -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getDatabase, ref, set, get } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyApQOM_mtFZ16RiNJEaIUhb4iYFBIBRK58",
            authDomain: "mneet-spark.firebaseapp.com",
            databaseURL: "https://mneet-spark-default-rtdb.firebaseio.com",
            projectId: "mneet-spark",
            storageBucket: "mneet-spark.firebasestorage.app",
            messagingSenderId: "252201633700",
            appId: "1:252201633700:web:1a1e7a2cff1f0b168ea331"
        };

        // Initialize App & Services
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        // DOM Elements
        const signInForm = document.getElementById('signInForm');
        const signUpForm = document.getElementById('signUpForm');
        const alertBox = document.getElementById('alertBox');
        
        // Navigation Switches
        document.getElementById('toSignUp').addEventListener('click', () => {
            signInForm.classList.add('hidden');
            signUpForm.classList.remove('hidden');
            hideAlert();
        });

        document.getElementById('toSignIn').addEventListener('click', () => {
            signUpForm.classList.add('hidden');
            signInForm.classList.remove('hidden');
            hideAlert();
        });

        function showAlert(msg, isError = true) {
            alertBox.textContent = msg;
            alertBox.className = isError ? "message error-msg" : "message success-msg";
            alertBox.style.display = "block";
        }

        function hideAlert() {
            alertBox.style.display = "none";
        }

        // ================= SIGN UP LOGIC =================
        signUpForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            hideAlert();

            const name = document.getElementById('regName').value.trim();
            const email = document.getElementById('regEmail').value.trim();
            const phone = document.getElementById('regPhone').value.trim();
            const city = document.getElementById('regCity').value.trim();
            const password = document.getElementById('regPassword').value;

            try {
                // 1. Create User Authentication account
                const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                const uid = userCredential.user.uid;

                // 2. Save complete user metadata to Realtime Database
                await set(ref(db, 'users/' + uid), {
                    name: name,
                    email: email,
                    phone: phone,
                    city: city,
                    role: 'student',
                    createdAt: new Date().toISOString()
                });

                showAlert("Account successfully registered! Switching to Login...", false);
                signUpForm.reset();
                setTimeout(() => {
                    document.getElementById('toSignIn').click();
                }, 2000);

            } catch (error) {
                showAlert("Registration Error: " + error.message);
            }
        });

        // ================= SIGN IN & AUTO DETECT LOGIC =================
        signInForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            hideAlert();

            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value;

            try {
                // 1. Authenticate with Firebase
                const userCredential = await signInWithEmailAndPassword(auth, email, password);
                const uid = userCredential.user.uid;

                // 2. Fetch the role from Realtime Database to perform Auto-Detection
                const snapshot = await get(ref(db, 'users/' + uid));
                
                if (snapshot.exists()) {
                    const userData = snapshot.val();
                    const role = userData.role;

                    showAlert(`Welcome back, ${userData.name || 'User'}! Redirecting...`, false);

                    // 3. Conditional Auto-Detection Navigation
                    setTimeout(() => {
                        if (role === 'admin') {
                            window.location.href = "admin_dashboard.html";
                        } else {
                            window.location.href = "student_dashboard.html";
                        }
                    }, 1500);
                } else {
                    showAlert("User profile data not found, accessing Student space by default.", false);
                    setTimeout(() => {
                        window.location.href = "student_dashboard.html";
                    }, 1500);
                }

            } catch (error) {
                showAlert("Authentication Failed: " + error.message);
            }
        });
    </script>
</body>
</html>
