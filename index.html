<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>mNEET - Ultimate Medical Prep Companion</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --gold: #F3B917;
            --bg-dark: #090D16;
            --bg-surface: #131A26;
            --bg-input: #030712;
            --text-title: #FFFFFF;
            --text-para: #94A3B8;
            --border-line: #1E293B;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-title);
            font-family: system-ui, -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
            padding: 20px;
        }

        .login-container {
            width: 100%;
            max-width: 400px;
            background-color: var(--bg-surface);
            border: 2px solid var(--border-line);
            border-radius: 24px;
            padding: 32px 24px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
        }

        .logo-area {
            font-size: 32px;
            font-weight: 900;
            margin-bottom: 8px;
            letter-spacing: 1px;
        }

        .logo-m { color: var(--text-title); }
        .logo-neet { color: var(--gold); }

        .tagline {
            font-size: 13px;
            color: var(--text-para);
            margin-bottom: 32px;
            font-weight: 500;
        }

        .form-title {
            font-size: 20px;
            font-weight: 800;
            margin-bottom: 24px;
            text-align: left;
            color: var(--text-title);
        }

        .input-group {
            margin-bottom: 16px;
            text-align: left;
        }

        .input-label {
            display: block;
            font-size: 12px;
            font-weight: 700;
            color: var(--text-para);
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-wrapper i {
            position: absolute;
            left: 14px;
            color: var(--text-para);
            font-size: 14px;
        }

        .form-input {
            width: 100%;
            background-color: var(--bg-input);
            border: 2px solid var(--border-line);
            color: var(--text-title);
            padding: 14px 14px 14px 42px;
            border-radius: 14px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }

        .form-input:focus {
            border-color: var(--gold);
        }

        .btn-sign-in {
            width: 100%;
            background-color: var(--gold);
            color: #000000;
            font-weight: 800;
            font-size: 14px;
            padding: 16px;
            border: none;
            border-radius: 14px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-top: 12px;
            transition: opacity 0.2s;
        }

        .btn-sign-in:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .footer-text {
            margin-top: 24px;
            font-size: 13px;
            color: var(--text-para);
        }

        .footer-text a {
            color: var(--gold);
            text-decoration: none;
            font-weight: 700;
        }
    </style>
</head>
<body>

    <div class="login-container">
        <!-- APP LOGO -->
        <div class="logo-area">
            <span class="logo-m">m</span><span class="logo-neet">NEET</span>
        </div>
        <p class="tagline">Your Ultimate Medical Prep Companion</p>

        <!-- FORM TITLE -->
        <h2 class="form-title">Sign In to Your Account</h2>

        <!-- LOGIN FORM -->
        <form id="main-auth-form">
            <div class="input-group">
                <label class="input-label">Gmail Address</label>
                <div class="input-wrapper">
                    <i class="fas fa-envelope"></i>
                    <input type="email" id="login-email" class="form-input" placeholder="Enter your registered email" required>
                </div>
            </div>

            <div class="input-group">
                <label class="input-label">Password</label>
                <div class="input-wrapper">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="login-password" class="form-input" placeholder="Enter your account password" required>
                </div>
            </div>

            <button type="submit" id="login-submit-btn" class="btn-sign-in">Sign In</button>
        </form>

        <!-- REDIRECT LINK -->
        <p class="footer-text">Don't have an account? <a href="#">Sign Up</a></p>
    </div>

    <!-- 🚀 CORE LOGIN AND AUTH CONTROL ENGINE -->
    <script type="module">
        import { auth, db } from "./firebase-config.js";
        import { signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { ref, get } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const authForm = document.getElementById("main-auth-form");
        const emailInput = document.getElementById("login-email");
        const passwordInput = document.getElementById("login-password");
        const loginBtn = document.getElementById("login-submit-btn");

        if (authForm) {
            authForm.addEventListener("submit", async (e) => {
                e.preventDefault();

                const email = emailInput.value.trim();
                const password = passwordInput.value;

                // ১. সাবমিট বাটন সাময়িকভাবে লক করা (অ্যান্টি-স্প্যাম এবং কোটা প্রোটেকশন)
                loginBtn.disabled = true;
                loginBtn.innerText = "VERIFYING ACCOUNT...";

                try {
                    // ২. ফায়ারবেস মেইন অথেন্টিকেশনে সাইন-ইন রিকোয়েস্ট পাঠানো
                    const userCredential = await signInWithEmailAndPassword(auth, email, password);
                    const user = userCredential.user;

                    // ৩. রিয়েল-টাইম ডাটাবেজ থেকে ইউজারের রোল (Role) রিড করা
                    const snap = await get(ref(db, 'users/' + user.uid));
                    
                    if (snap.exists()) {
                        const userData = snap.val();
                        
                        // যদি ডাটাবেজে রোল 'admin' থাকে অথবা ইনপুট ইমেইলটি তোমার স্পেশাল জিমেইল হয়
                        if (userData.role === "admin" || email === "mi4286803@gmail.com") {
                            window.location.href = "admin_dashboard.html";
                        } else {
                            window.location.href = "student_dashboard.html";
                        }
                    } else {
                        // ব্যাকআপ ফিল্টার: ডাটাবেজে কোনো কারণে ডাটা মিসিং হলেও জিমেইল ম্যাচ করলে অ্যাডমিন প্যানেল লোড হবে
                        if (email === "mi4286803@gmail.com") {
                            window.location.href = "admin_dashboard.html";
                        } else {
                            window.location.href = "student_dashboard.html";
                        }
                    }

                } catch (error) {
                    console.error("Auth Failure:", error);
                    alert("Authentication Failed: " + error.message);
                    
                    // ভুল পাসওয়ার্ড বা এরর আসলে বাটন আবার আগের অবস্থায় নিয়ে যাওয়া
                    loginBtn.disabled = false;
                    loginBtn.innerText = "SIGN IN";
                }
            });
        }
    </script>
</body>
</html>
