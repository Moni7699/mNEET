<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>mNEET Platform</title>
    <!-- Tailwind CSS (Free CDN for easy layout) -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="flex items-center justify-center min-h-screen p-4">

    <div class="w-full max-w-md p-8 rounded-2xl shadow-2xl" style="background-color: #1A1A1A; border: 1px solid #2A2A2A;">
        
        <!-- App Name / Logo -->
        <div class="text-center mb-8">
            <h1 class="text-4xl font-extrabold tracking-wider">
                <span class="text-white">m</span><span class="text-golden">NEET</span>
            </h1>
            <p class="text-gray-400 text-sm mt-1">Your Ultimate Medical Prep Companion</p>
        </div>

        <!-- ================= SIGN IN FORM ================= -->
        <div id="signin-box">
            <h2 class="text-xl font-bold mb-6 text-center">Sign In to Your Account</h2>
            <form id="signin-form" class="space-y-4">
                <div>
                    <label class="block text-sm text-gray-400 mb-1">Gmail or Phone No</label>
                    <input type="text" id="login-identifier" required class="w-full px-4 py-3 rounded-lg text-sm">
                </div>
                <div>
                    <label class="block text-sm text-gray-400 mb-1">Password</label>
                    <input type="password" id="login-password" required class="w-full px-4 py-3 rounded-lg text-sm">
                </div>
                <div class="text-right">
                    <button type="button" id="goto-forgot" class="text-xs text-golden hover:underline bg-transparent border-none cursor-pointer">Forgot Password?</button>
                </div>
                <button type="submit" class="w-full py-3 bg-golden font-bold rounded-lg transition duration-200 cursor-pointer">Sign In</button>
            </form>
            <p class="text-sm text-center text-gray-400 mt-6">
                Don't have an account? <button id="goto-signup" class="text-golden hover:underline bg-transparent border-none cursor-pointer">Sign Up</button>
            </p>
        </div>

        <!-- ================= SIGN UP FORM ================= -->
        <div id="signup-box" class="hidden">
            <h2 class="text-xl font-bold mb-6 text-center">Create New Account</h2>
            <form id="signup-form" class="space-y-4">
                <div>
                    <label class="block text-sm text-gray-400 mb-1">Full Name</label>
                    <input type="text" id="reg-name" required class="w-full px-4 py-3 rounded-lg text-sm">
                </div>
                <div>
                    <label class="block text-sm text-gray-400 mb-1">Gmail</label>
                    <input type="email" id="reg-email" required class="w-full px-4 py-3 rounded-lg text-sm">
                </div>
                <div>
                    <label class="block text-sm text-gray-400 mb-1">Phone Number</label>
                    <input type="tel" id="reg-phone" required class="w-full px-4 py-3 rounded-lg text-sm">
                </div>
                <div>
                    <label class="block text-sm text-gray-400 mb-1">City</label>
                    <input type="text" id="reg-city" required class="w-full px-4 py-3 rounded-lg text-sm">
                </div>
                <div>
                    <label class="block text-sm text-gray-400 mb-1">Password</label>
                    <input type="password" id="reg-password" required class="w-full px-4 py-3 rounded-lg text-sm">
                </div>
                <button type="submit" class="w-full py-3 bg-golden font-bold rounded-lg transition duration-200 cursor-pointer">Send OTP & Register</button>
            </form>
            <p class="text-sm text-center text-gray-400 mt-6">
                Already have an account? <button id="goto-signin" class="text-golden hover:underline bg-transparent border-none cursor-pointer">Sign In</button>
            </p>
        </div>

        <!-- ================= OTP VERIFICATION BOX ================= -->
        <div id="otp-box" class="hidden">
            <h2 class="text-xl font-bold mb-2 text-center">Verify Your Gmail</h2>
            <p class="text-xs text-center text-gray-400 mb-6">We have sent a 6-digit OTP to your Gmail.</p>
            <form id="otp-form" class="space-y-4">
                <div>
                    <label class="block text-sm text-gray-400 mb-1">Enter OTP</label>
                    <input type="text" id="email-otp" maxlength="6" required class="w-full px-4 py-3 rounded-lg text-center tracking-widest text-lg">
                </div>
                <button type="submit" class="w-full py-3 bg-golden font-bold rounded-lg transition duration-200 cursor-pointer">Verify & Submit</button>
            </form>
        </div>

        <!-- ================= FORGOT PASSWORD BOX ================= -->
        <div id="forgot-box" class="hidden">
            <h2 class="text-xl font-bold mb-2 text-center">Reset Password</h2>
            <p class="text-xs text-center text-gray-400 mb-6">Enter your registered Gmail to get a password reset link.</p>
            <form id="forgot-form" class="space-y-4">
                <div>
                    <label class="block text-sm text-gray-400 mb-1">Gmail Address</label>
                    <input type="email" id="forgot-email" required class="w-full px-4 py-3 rounded-lg text-sm">
                </div>
                <button type="submit" class="w-full py-3 bg-golden font-bold rounded-lg transition duration-200 cursor-pointer">Send Reset Link</button>
            </form>
            <div class="text-center mt-4">
                <button id="back-to-login" class="text-sm text-golden hover:underline bg-transparent border-none cursor-pointer">Back to Sign In</button>
            </div>
        </div>

    </div>

    <!-- Firebase মডিউল স্ক্রিপ্ট লিংক এবং লজিক লিংক -->
    <script type="module" src="auth.js"></script>
</body>
  </html>
