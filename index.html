<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>mNEET Platform</title>
    <style>
        /* 🎨 প্রফেশনাল কালার প্যালেট (কোনো মিক্সিং হবে না) */
        :root {
            --bg-main: #0d1117;
            --bg-card: #161b22;
            --border-color: #30363d;
            --text-main: #c9d1d9;
            --text-muted: #8b949e;
            --accent-blue: #58a6ff;
            --accent-green: #2ea44f;
            --accent-red: #da3637;
            --coin-gold: #f1c40f;
        }

        body.white-mode {
            --bg-main: #f8f9fa;
            --bg-card: #ffffff;
            --border-color: #e1e4e8;
            --text-main: #24292e;
            --text-muted: #586069;
            --accent-blue: #0366d6;
            --accent-green: #28a745;
            --accent-red: #d73a49;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            margin: 0; padding: 0; overflow: hidden;
            height: 100vh; display: flex; flex-direction: column;
        }

        /* 📱 💻 রেসপন্সিভ কন্টেইনার (ল্যাপটপ ও ফোনে অটো অ্যাডজাস্ট) */
        .app-container {
            width: 100%; max-width: 100%; height: 100vh;
            margin: 0 auto; display: flex; flex-direction: column;
            background: var(--bg-main);
        }

        @media (min-width: 768px) {
            .app-container { max-width: 450px; border-left: 1px solid var(--border-color); border-right: 1px solid var(--border-color); box-shadow: 0 0 20px rgba(0,0,0,0.2); }
            body { background-color: #010409; }
            body.white-mode { background-color: #e1e4e8; }
        }

        .screen { display: none; height: 100%; width: 100%; box-sizing: border-box; }
        .screen.active { display: flex; flex-direction: column; justify-content: center; align-items: center; }
        #app-dashboard.screen.active { display: flex; flex-direction: column; justify-content: flex-start; align-items: stretch; }

        /* 🔑 AUTH CARD DESIGN */
        .auth-card {
            background: var(--bg-card); border: 1px solid var(--border-color);
            padding: 25px; border-radius: 12px; width: 85%; box-shadow: 0 8px 24px rgba(0,0,0,0.3);
            display: none;
        }
        .auth-card.active { display: block; }
        h2 { margin-top: 0; text-align: center; font-size: 1.5rem; color: var(--text-main); }
        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; font-size: 0.8rem; color: var(--text-muted); margin-bottom: 5px; }
        .input-group input { width: 100%; padding: 10px; border-radius: 6px; border: 1px solid var(--border-color); background: var(--bg-main); color: var(--text-main); box-sizing: border-box; }
        .btn-primary { width: 100%; padding: 12px; background: var(--accent-blue); border: none; border-radius: 6px; color: #fff; font-weight: bold; cursor: pointer; font-size: 1rem; }

        /* ⬆️ CONSTANT TOP ROW */
        .top-row {
            height: 60px; background: var(--bg-card); border-bottom: 1px solid var(--border-color);
            display: flex; justify-content: space-between; align-items: center; padding: 0 15px; z-index: 10;
        }
        .top-left, .top-right { display: flex; align-items: center; gap: 15px; }
        .icon-btn { background: transparent; border: none; color: var(--text-main); font-size: 1.2rem; cursor: pointer; padding: 5px; }
        .coin-badge { background: var(--bg-main); border: 1px solid var(--coin-gold); color: var(--coin-gold); padding: 5px 10px; border-radius: 20px; font-size: 0.85rem; font-weight: bold; }

        /* ⬇️ CONSTANT BOTTOM ROW */
        .bottom-row {
            height: 65px; background: var(--bg-card); border-top: 1px solid var(--border-color);
            display: flex; justify-content: space-around; align-items: center; z-index: 10;
        }
        .nav-tab {
            background: transparent; border: none; color: var(--text-muted);
            display: flex; flex-direction: column; align-items: center; font-size: 0.75rem; cursor: pointer; gap: 4px;
        }
        .nav-tab.active-tab { color: var(--accent-blue); font-weight: bold; }

        /* 📜 SCROLLABLE MIDDLE ZONE */
        .middle-content { flex: 1; overflow-y: auto; padding: 15px; box-sizing: border-box; }

        /* ☰ SIDEBAR DESIGN */
        .sidebar {
            position: fixed; top: 0; right: -280px; width: 280px; height: 100%; background: var(--bg-card); border-left: 1px solid var(--border-color);
            transition: 0.3s ease; z-index: 100; display: flex; flex-direction: column; padding: 20px; box-sizing: border-box;
        }
        .sidebar.open { right: 0; }
        .sidebar-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 99; display: none; }
        .sidebar-overlay.active { display: block; }
        .sb-profile-img { width: 65px; height: 65px; border-radius: 50%; background: var(--border-color); margin: 0 auto 15px auto; display: block; border: 2px solid var(--accent-blue); }
        .sb-input-group { margin-bottom: 12px; }
        .sb-input-group label { display: block; font-size: 0.75rem; color: var(--text-muted); margin-bottom: 3px; }
        .sb-input-group input { width: 100%; padding: 8px; border-radius: 4px; border: 1px solid var(--border-color); background: var(--bg-main); color: var(--text-main); box-sizing: border-box; font-size: 0.85rem; }
        .social-links { display: flex; flex-wrap: wrap; gap: 8px; margin: 15px 0; }
        .social-btn { flex: 1; min-width: 45%; padding: 6px; border: 1px solid var(--border-color); background: var(--bg-main); color: var(--text-main); text-align: center; border-radius: 4px; text-decoration: none; font-size: 0.75rem; }
    </style>
</head>
<body>

    <div class="app-container">
        <!-- 🌟 SPLASH SCREEN -->
        <div id="splash-screen" class="screen active">
            <h1 style="color: #fff; text-shadow: 0 0 10px var(--accent-blue);">mNEET</h1>
        </div>

        <!-- 🔑 AUTH SCREEN -->
        <div id="auth-container" class="screen">
            <!-- Login -->
            <div id="signin-card" class="auth-card active">
                <h2>Aspirant Sign In</h2>
                <form id="signin-form">
                    <div class="input-group"><label>Email Address</label><input type="email" id="login-email" required></div>
                    <div class="input-group"><label>Password</label><input type="password" id="login-password" required></div>
                    <div style="text-align: right; margin-bottom: 15px;"><a href="#" id="go-to-forgot" style="color: var(--accent-blue); text-decoration: none; font-size: 0.85rem;">Forgot Password?</a></div>
                    <button type="submit" class="btn-primary">Sign In</button>
                </form>
                <p style="text-align: center; font-size: 0.9rem;">New? <a href="#" id="go-to-signup" style="color: var(--accent-blue);">Create Account</a></p>
            </div>
            <!-- Signup -->
            <div id="signup-card" class="auth-card">
                <h2>Create Account</h2>
                <form id="signup-form">
                    <div class="input-group"><label>Full Name</label><input type="text" id="reg-name" required></div>
                    <div class="input-group"><label>Email Address</label><input type="email" id="reg-email" required></div>
                    <div class="input-group"><label>Phone Number</label><input type="tel" id="reg-phone" required></div>
                    <div class="input-group"><label>City / Town</label><input type="text" id="reg-city" required></div>
                    <div class="input-group"><label>Password</label><input type="password" id="reg-password" required></div>
                    <button type="submit" class="btn-primary">Register</button>
                </form>
                <p style="text-align: center; font-size: 0.9rem;">Have account? <a href="#" id="go-to-signin" style="color: var(--accent-blue);">Sign In</a></p>
            </div>
        </div>

        <!-- 🌐 CORE DASHBOARD -->
        <div id="app-dashboard" class="screen">
            <!-- ⬆️ CONSTANT TOP ROW -->
            <div class="top-row">
                <div class="top-left">
                    <button class="icon-btn" id="btn-notif">🔔</button>
                    <button class="icon-btn" id="btn-challenge">⚔️</button>
                </div>
                <div class="top-center">
                    <span id="nav-user-name">Loading...</span>
                </div>
                <div class="top-right">
                    <div class="coin-badge">🟡 <span id="user-bp-coins">0</span> bP</div>
                    <button class="icon-btn" id="btn-sidebar-open">☰</button>
                </div>
            </div>

            <!-- 📜 SCROLLABLE MIDDLE ZONE -->
            <div class="middle-content" id="main-scroll-zone">
                <!-- এখানে home.js থেকে প্রফেশনাল কন্টেন্ট লোড হবে -->
            </div>

            <!-- ⬇️ CONSTANT BOTTOM ROW -->
            <div class="bottom-row">
                <button class="nav-tab active-tab" data-tab="home"><span>🏠</span><span style="font-size: 0.7rem;">Home</span></button>
                <button class="nav-tab" data-screen="study"><span>📖</span><span style="font-size: 0.7rem;">Study</span></button>
                <button class="nav-tab" data-screen="test"><span>🎯</span><span style="font-size: 0.7rem;">Test</span></button>
                <button class="nav-tab" data-screen="buytest"><span>💳</span><span style="font-size: 0.7rem;">Buy Test</span></button>
                <button class="nav-tab" data-screen="mstore"><span>🏪</span><span style="font-size: 0.7rem;">mStore</span></button>
            </div>
        </div>
    </div>

    <!-- ☰ SIDEBAR DRAWERS -->
    <div class="sidebar-overlay" id="sb-overlay"></div>
    <div class="sidebar" id="app-sidebar">
        <button class="icon-btn" id="btn-sidebar-close" style="align-self: flex-end;">❌</button>
        <div style="overflow-y: auto; flex: 1;">
            <div class="sb-profile-img"></div>
            <div class="sb-input-group"><label>Full Name</label><input type="text" id="sb-name" readonly></div>
            <div class="sb-input-group"><label>Phone Number</label><input type="text" id="sb-phone" readonly></div>
            <div class="sb-input-group"><label>Dream College</label><input type="text" id="sb-dream-college" placeholder="e.g. AIIMS Delhi"></div>
            <div class="sb-input-group"><label>Target Exam Date</label><input type="date" id="sb-target-date"></div>
            
            <p style="font-size:0.75rem; color:var(--text-muted); margin: 15px 0 5px 0; font-weight:bold;">Official Channels</p>
            <div class="social-links">
                <a href="#" id="link-yt" target="_blank" class="social-btn" style="color:#ff0000;">YouTube</a>
                <a href="#" id="link-insta" target="_blank" class="social-btn" style="color:#e1306c;">Instagram</a>
                <a href="#" id="link-fb" target="_blank" class="social-btn" style="color:#4267b2;">Facebook</a>
                <a href="#" id="link-tele" target="_blank" class="social-btn" style="color:#0088cc;">Telegram</a>
            </div>
            <button class="btn-primary" id="btn-theme-toggle" style="background:var(--border-color); color:var(--text-main); font-size:0.85rem; margin-bottom:10px;">🌓 Switch Mode</button>
            <button class="btn-primary" id="btn-sidebar-logout" style="background:var(--accent-red); font-size:0.85rem;">Logout</button>
        </div>
    </div>

    <script type="module" src="js/auth.js"></script>
</body>
    </html>
