<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>mNEET - Authentication</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="theme-dark"> <!-- বাই ডিফল্ট তোমার ডার্ক থিমটি লোড হবে -->

    <div class="auth-box">
        
        <!-- App Identity Logo -->
        <div class="text-center" style="margin-bottom: 32px;">
            <h1 style="font-size: 34px; margin: 0; font-weight: 900; letter-spacing: 0.5px;">
                <span class="m-logo">m</span><span class="neet-logo">NEET</span>
            </h1>
            <p class="text-muted" style="font-size: 12px; margin-top: 4px;">Your Ultimate Medical Prep Companion</p>
        </div>

        <!-- ================= SIGN IN MODULE ================= -->
        <div id="signin-box">
            <h2 class="text-center" style="font-size: 22px; margin-bottom: 24px; font-weight: 800;">Sign In to Your Account</h2>
            <form id="signin-form">
                <div class="input-group">
                    <label>Gmail or Phone No</label>
                    <input type="text" id="login-identifier" required>
                </div>
                <div class="input-group">
                    <label>Password</label>
                    <input type="password" id="login-password" required>
                </div>
                <div style="text-align: right; margin-bottom: 20px;">
                    <button type="button" id="goto-forgot" class="link-btn" style="font-size: 12px;">Forgot Password?</button>
                </div>
                <button type="submit" class="btn-mneet">Sign In</button>
            </form>
            <p class="text-muted text-center" style="font-size: 13px; margin-top: 24px;">
                Don't have an account? <button id="goto-signup" class="link-btn">Sign Up</button>
            </p>
        </div>

        <!-- ================= SIGN UP MODULE ================= -->
        <div id="signup-box" class="hidden">
            <h2 class="text-center" style="font-size: 22px; margin-bottom: 24px; font-weight: 800;">Create New Account</h2>
            <form id="signup-form">
                <div class="input-group">
                    <label>Full Name</label>
                    <input type="text" id="reg-name" required>
                </div>
                <div class="input-group">
                    <label>Gmail</label>
                    <input type="email" id="reg-email" required>
                </div>
                <div class="input-group">
                    <label>Phone Number</label>
                    <input type="tel" id="reg-phone" required>
                </div>
                <div class="input-group">
                    <label>City</label>
                    <input type="text" id="reg-city" required>
                </div>
                <div class="input-group">
                    <label>Password</label>
                    <input type="password" id="reg-password" required>
                </div>
                <button type="submit" class="btn-mneet">Send OTP & Register</button>
            </form>
            <p class="text-muted text-center" style="font-size: 13px; margin-top: 24px;">
                Already have an account? <button id="goto-signin" class="link-btn">Sign In</button>
            </p>
        </div>

        <!-- ================= FORGOT PASSWORD MODULE ================= -->
        <div id="forgot-box" class="hidden">
            <h2 class="text-center" style="font-size: 22px; margin-bottom: 12px; font-weight: 800;">Reset Password</h2>
            <p class="text-muted text-center" style="font-size: 12px; margin-bottom: 24px;">Enter your registered Gmail to get a reset link.</p>
            <form id="forgot-form">
                <div class="input-group">
                    <label>Gmail Address</label>
                    <input type="email" id="forgot-email" required>
                </div>
                <button type="submit" class="btn-mneet">Send Reset Link</button>
            </form>
            <div class="text-center" style="margin-top: 20px;">
                <button id="back-to-login" class="link-btn">Back to Sign In</button>
            </div>
        </div>

    </div>

    <script type="module" src="auth.js"></script>
</body>
    </html>
