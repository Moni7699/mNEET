<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>mNEET - Authentication Arena</title>
    <!-- Tailwind CSS for Modern UI -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Firebase App and Auth SDKs (Modular v9) -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

        // Firebase Configuration using your project ID
        const firebaseConfig = {
            projectId: "mneet-spark",
            authDomain: "mneet-spark.firebaseapp.com",
            storageBucket: "mneet-spark.appspot.com"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // Dom Elements
        const authForm = document.getElementById('authForm');
        const nameGroup = document.getElementById('nameGroup');
        const roleGroup = document.getElementById('roleGroup');
        const submitBtn = document.getElementById('submitBtn');
        const toggleLink = document.getElementById('toggleLink');
        const formTitle = document.getElementById('form-title');
        const errorMessage = document.getElementById('errorMessage');

        let isSignUp = false;

        // Toggle Login / Signup Mode
        window.toggleMode = function(e) {
            e.preventDefault();
            isSignUp = !isSignUp;
            errorMessage.innerText = "";
            
            if (isSignUp) {
                nameGroup.classList.remove('hidden');
                roleGroup.classList.remove('hidden');
                formTitle.innerText = "Join the NEET Arena";
                submitBtn.innerText = "Create Account";
                toggleLink.innerHTML = 'Already have an account? <span class="text-sky-400 font-bold cursor-pointer hover:underline">Log In</span>';
            } else {
                nameGroup.classList.add('hidden');
                roleGroup.classList.add('hidden');
                formTitle.innerText = "Crack NEET with Gamified Learning";
                submitBtn.innerText = "Log In";
                toggleLink.innerHTML = 'Don\'t have an account? <span class="text-sky-400 font-bold cursor-pointer hover:underline">Sign Up</span>';
            }
        };

        // Handle Authentication Logic
        authForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            errorMessage.innerText = "";
            
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            
            try {
                if (isSignUp) {
                    const fullName = document.getElementById('fullName').value.trim();
                    const role = document.getElementById('role').value;
                    
                    if (!fullName) {
                        errorMessage.innerText = "Please enter your full name.";
                        return;
                    }

                    // 1. Create user in Firebase Auth
                    const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                    const user = userCredential.user;

                    // 2. Save Additional Info in Firestore
                    await setDoc(doc(db, "users", user.uid), {
                        uid: user.uid,
                        name: fullName,
                        email: email,
                        role: role,
                        bpCoins: role === 'student' ? 100 : 0, // Gift 100 bP Coins to new students
                        createdAt: new Date().toISOString()
                    });

                    alert("Account Created Successfully!");
                    redirectUser(role);

                } else {
                    // 1. Log In User
                    const userCredential = await signInWithEmailAndPassword(auth, email, password);
                    const user = userCredential.user;

                    // 2. Fetch User Role from Firestore
                    const userDoc = await getDoc(doc(db, "users", user.uid));
                    if (userDoc.exists()) {
                        const userData = userDoc.data();
                        redirectUser(userData.role);
                    } else {
                        errorMessage.innerText = "User data not found in database.";
                    }
                }
            } catch (error) {
                console.error(error);
                // Human-readable error messages
                if (error.code === 'auth/email-already-in-use') {
                    errorMessage.innerText = "This email is already registered.";
                } else if (error.code === 'auth/wrong-password' || error.code === 'auth/user-not-found') {
                    errorMessage.innerText = "Invalid Email or Password.";
                } else {
                    errorMessage.innerText = error.message;
                }
            }
        });

        // Smart Redirection Matrix
        function redirectUser(role) {
            if (role === 'admin') {
                window.location.href = "admin-dashboard.html";
            } else {
                window.location.href = "student-dashboard.html";
            }
        }
    </script>
</head>
<body class="bg-slate-950 min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-md bg-slate-900 border border-slate-800 rounded-2xl shadow-2xl p-8 transform transition-all duration-300">
        <!-- Logo and Brand -->
        <div class="text-center mb-8">
            <h1 class="text-4xl font-black tracking-wider text-sky-400 drop-shadow">mNEET</h1>
            <p id="form-title" class="text-slate-400 text-sm mt-2 transition-all">Crack NEET with Gamified Learning</p>
        </div>

        <!-- Error Notification Panel -->
        <div id="errorMessage" class="text-rose-500 text-sm text-center font-medium mb-4 transition-all"></div>

        <!-- Authentication Form -->
        <form id="authForm" class="space-y-5">
            <!-- Full Name (Hidden in Login Mode) -->
            <div id="nameGroup" class="space-y-2 hidden transition-all">
                <label class="text-sm font-semibold text-slate-400 block">Full Name</label>
                <input type="text" id="fullName" class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-3 text-white text-base focus:outline-none focus:border-sky-400 transition" placeholder="Dr. Rahul Sharma">
            </div>

            <!-- Email Input -->
            <div class="space-y-2">
                <label class="text-sm font-semibold text-slate-400 block">Email Address</label>
                <input type="email" id="email" required class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-3 text-white text-base focus:outline-none focus:border-sky-400 transition" placeholder="yourname@gmail.com">
            </div>

            <!-- Password Input -->
            <div class="space-y-2">
                <label class="text-sm font-semibold text-slate-400 block">Password</label>
                <input type="password" id="password" required class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-3 text-white text-base focus:outline-none focus:border-sky-400 transition" placeholder="••••••••">
            </div>

            <!-- User Role (Hidden in Login Mode) -->
            <div id="roleGroup" class="space-y-2 hidden transition-all">
                <label class="text-sm font-semibold text-slate-400 block">Register As</label>
                <select id="role" class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-3 text-white text-base focus:outline-none focus:border-sky-400 transition">
                    <option value="student">NEET Aspirant (Student)</option>
                    <option value="admin">Platform Mentor (Admin)</option>
                </select>
            </div>

            <!-- Submit Action -->
            <button type="submit" id="submitBtn" class="w-full bg-sky-500 hover:bg-sky-400 text-slate-950 font-bold py-3.5 px-4 rounded-xl shadow-lg transition duration-200 transform hover:-translate-y-0.5 active:translate-y-0">
                Log In
            </button>
        </form>

        <!-- Toggle View Matrix -->
        <div class="text-center mt-6 text-sm text-slate-400" id="toggleLink" onclick="toggleMode(event)">
            Don't have an account? <span class="text-sky-400 font-bold cursor-pointer hover:underline">Sign Up</span>
        </div>
    </div>

</body>
</html>
